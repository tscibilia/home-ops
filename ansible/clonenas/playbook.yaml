- name: Bootstrap clonenas doco-cd
  hosts: all
  become: true
  gather_facts: false
  vars:
    ansible_user: sysadmin
    ansible_python_interpreter: auto_silent
    ansible_remote_tmp: /tmp
    dococd_config_dir: /mnt/vault/data/sysadmin/.config/doco-cd

  tasks:
    - name: Check host connectivity
      ansible.builtin.ping:

    - name: Read secrets from aKeyless
      ansible.builtin.shell: "akeyless get-secret-value --name '{{ item }}'"
      delegate_to: localhost
      become: false
      loop:
        - docker/doco-cd/github-token
        - docker/doco-cd/akeyless-access-id
        - docker/doco-cd/akeyless-access-key
      check_mode: false
      changed_when: false
      no_log: true
      register: secrets_raw

    - name: Set secret facts
      ansible.builtin.set_fact:
        doco_github_token: "{{ secrets_raw.results[0].stdout }}"
        doco_akeyless_access_id: "{{ secrets_raw.results[1].stdout }}"
        doco_akeyless_access_key: "{{ secrets_raw.results[2].stdout }}"
      no_log: true

    - name: doco-cd | Create config directory
      ansible.builtin.shell:
        cmd: mkdir -p {{ dococd_config_dir | quote }}
        creates: "{{ dococd_config_dir }}"
      become: false

    - name: doco-cd | Copy docker-compose app file
      ansible.builtin.copy:
        src: ../../docker/clonenas/.doco-cd/docker-compose.app.yaml
        dest: "{{ dococd_config_dir }}/docker-compose.yaml"
      become: false

    - name: doco-cd | Copy Dockerfile
      ansible.builtin.copy:
        src: ../../docker/clonenas/.doco-cd/Dockerfile
        dest: "{{ dococd_config_dir }}/Dockerfile"
      become: false

    - name: doco-cd | Copy proxy.py
      ansible.builtin.copy:
        src: ../../docker/clonenas/.doco-cd/proxy.py
        dest: "{{ dococd_config_dir }}/proxy.py"
      become: false

    - name: doco-cd | Copy cron-update.sh
      ansible.builtin.copy:
        src: ../../docker/clonenas/.doco-cd/cron-update.sh
        dest: "{{ dococd_config_dir }}/cron-update.sh"
        mode: "0755"
      become: false

    - name: doco-cd | Install nightly update cron job
      ansible.builtin.cron:
        name: doco-cd stack update
        minute: "0"
        hour: "3"
        job: "{{ dococd_config_dir }}/cron-update.sh"
        user: sysadmin
        state: present

    - name: doco-cd | Create secret files
      ansible.builtin.copy:
        dest: "{{ dococd_config_dir }}/{{ item.name }}"
        content: "{{ item.content }}"
        mode: "0600"
      no_log: true
      become: false
      loop:
        - name: gh_token
          content: "{{ doco_github_token }}"
        - name: akeyless_access_id
          content: "{{ doco_akeyless_access_id }}"
        - name: akeyless_access_key
          content: "{{ doco_akeyless_access_key }}"

    - name: docker | Install Docker CE
      ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
      args:
        executable: /bin/bash
        creates: /usr/bin/docker

    - name: docker | Start and enable Docker daemon
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: docker | Wait for Docker socket
      ansible.builtin.wait_for:
        path: /var/run/docker.sock
        state: present
        timeout: 30

    - name: docker | Add sysadmin to docker group
      ansible.builtin.user:
        name: sysadmin
        groups: docker
        append: true

    - name: doco-cd | Ensure doco-cd Docker network exists
      ansible.builtin.shell: docker network inspect doco-cd >/dev/null 2>&1 || docker network create doco-cd
      changed_when: false

    - name: doco-cd | Run docker-compose
      ansible.builtin.shell: >-
        docker compose -f {{ dococd_config_dir }}/docker-compose.yaml
        up -d --build --pull always
      when: not ansible_check_mode

    - name: doco-cd | Wait for akeyless-proxy healthy
      ansible.builtin.shell: "docker inspect --format '{% raw %}{{.State.Health.Status}}{% endraw %}' akeyless-proxy"
      register: proxy_health
      until: proxy_health.stdout.strip() == "healthy"
      retries: 30
      delay: 5
      changed_when: false
      when: not ansible_check_mode
