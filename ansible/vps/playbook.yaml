---
- name: Bootstrap Pangolin VPS
  hosts: all
  gather_facts: false
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: auto_silent
    pangolin_org_id: homelab
    pangolin_org_name: Homelab
    pangolin_org_subnet: 100.100.0.0/16
    pangolin_org_utility_subnet: 100.43.0.0/24
    host_ssh_port: 22222
    dococd_config_dir: /opt/doco-cd

  tasks:
    - name: Check host connectivity
      ansible.builtin.ping:

    - name: Read secrets from aKeyless
      ansible.builtin.shell: "akeyless get-secret-value --name '{{ item }}'"
      delegate_to: localhost
      loop:
        - docker/doco-cd/github-token
        - docker/doco-cd/akeyless-access-id
        - docker/doco-cd/akeyless-access-key
        - docker/vps-pangolin/admin-email
        - docker/vps-pangolin/admin-password
        - docker/vps-pangolin/crowdsec-traefik-api-key
        - docker/vps-pangolin/crowdsec-enroll-key
        - docker/secret-domain
      check_mode: false
      changed_when: false
      no_log: true
      register: secrets_raw

    - name: Set secret facts
      ansible.builtin.set_fact:
        doco_github_token: "{{ secrets_raw.results[0].stdout }}"
        doco_akeyless_access_id: "{{ secrets_raw.results[1].stdout }}"
        doco_akeyless_access_key: "{{ secrets_raw.results[2].stdout }}"
        pangolin_admin_email: "{{ secrets_raw.results[3].stdout }}"
        pangolin_admin_password: "{{ secrets_raw.results[4].stdout }}"
        crowdsec_traefik_api_key: "{{ secrets_raw.results[5].stdout }}"
        crowdsec_enroll_key: "{{ secrets_raw.results[6].stdout }}"
        pangolin_base_domain: "{{ secrets_raw.results[7].stdout }}"
        pangolin_hostname: "tun.{{ secrets_raw.results[7].stdout }}"
      no_log: true

    - name: user
      become: true
      when: bootstrap_mode | default(false)
      block:
        - name: user | Create ubuntu user
          ansible.builtin.user:
            name: ubuntu
            groups: sudo
            shell: /bin/bash
            create_home: true

        - name: user | Add SSH public key
          ansible.posix.authorized_key:
            user: ubuntu
            key: "{{ lookup('file', '~/.ssh/home-ops.pub') }}"

    - name: packages
      become: true
      when: bootstrap_mode | default(false)
      block:
        - name: packages | Install Docker
          ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
          args:
            executable: /bin/bash
            creates: /usr/bin/docker

        - name: packages | Add ubuntu to docker group
          ansible.builtin.user:
            name: ubuntu
            groups: docker
            append: true

    - name: ssh
      become: true
      when: bootstrap_mode | default(false)
      block:
        - name: ssh | Update SSH socket port
          ansible.builtin.replace:
            path: /lib/systemd/system/ssh.socket
            regexp: "^(ListenStream=.+):\\d+$"
            replace: "\\1:{{ host_ssh_port }}"
          notify:
            - Reload systemd daemon
            - Restart ssh.socket

        - name: ssh | Harden sshd_config
          ansible.builtin.copy:
            dest: /etc/ssh/sshd_config.d/01-hardening.conf
            content: |
              PermitRootLogin no
              PasswordAuthentication no
              MaxAuthTries 3
              LoginGraceTime 20
            owner: root
            mode: "0644"
          notify: Restart ssh.socket

    - name: firewall
      become: true
      when: bootstrap_mode | default(false)
      block:
        - name: firewall | Allow ports
          community.general.ufw:
            rule: allow
            port: "{{ item.port }}"
            proto: "{{ item.protocol | default('tcp') }}"
          loop:
            - name: SSH original
              port: "22"
            - name: SSH hardened
              port: "{{ host_ssh_port }}"
            - name: HTTP
              port: "80"
            - name: HTTPS
              port: "443"
            - name: WireGuard
              port: "51820"
              protocol: udp
            - name: Gerbil
              port: "21820"
              protocol: udp

        - name: firewall | Enable UFW
          community.general.ufw:
            state: enabled
            policy: deny

    - name: doco-cd
      become: false
      block:
        - name: doco-cd | Create config directory
          ansible.builtin.file:
            path: "{{ dococd_config_dir }}"
            state: directory
            owner: ubuntu
            group: ubuntu
            mode: "0755"

        - name: doco-cd | Copy docker-compose app file
          ansible.builtin.copy:
            src: ../../docker/vps/.doco-cd/docker-compose.app.yaml
            dest: "{{ dococd_config_dir }}/docker-compose.app.yaml"
            owner: ubuntu
            group: ubuntu
            mode: "0644"

        - name: doco-cd | Copy Dockerfile
          ansible.builtin.copy:
            src: ../../docker/vps/.doco-cd/Dockerfile
            dest: "{{ dococd_config_dir }}/Dockerfile"
            owner: ubuntu
            group: ubuntu
            mode: "0644"

        - name: doco-cd | Copy proxy.py
          ansible.builtin.copy:
            src: ../../docker/vps/.doco-cd/proxy.py
            dest: "{{ dococd_config_dir }}/proxy.py"
            owner: ubuntu
            group: ubuntu
            mode: "0644"

        - name: doco-cd | Copy cron-update.sh
          ansible.builtin.copy:
            src: ../../docker/vps/.doco-cd/cron-update.sh
            dest: "{{ dococd_config_dir }}/cron-update.sh"
            owner: ubuntu
            group: ubuntu
            mode: "0755"

        - name: doco-cd | Install nightly update cron job
          ansible.builtin.cron:
            name: doco-cd stack update
            minute: "0"
            hour: "3"
            job: "{{ dococd_config_dir }}/cron-update.sh"
            user: ubuntu
            state: present

        - name: doco-cd | Create secret files
          ansible.builtin.copy:
            dest: "{{ dococd_config_dir }}/{{ item.name }}"
            content: "{{ item.content }}"
            owner: ubuntu
            group: ubuntu
            mode: "0600"
          no_log: true
          loop:
            - name: gh_token
              content: "{{ doco_github_token }}"
            - name: akeyless_access_id
              content: "{{ doco_akeyless_access_id }}"
            - name: akeyless_access_key
              content: "{{ doco_akeyless_access_key }}"

        - name: doco-cd | Create pangolin Docker network
          community.docker.docker_network:
            name: pangolin
            driver: bridge
            labels:
              com.docker.compose.network: default
              com.docker.compose.project: 01-pangolin
            state: present

        - name: doco-cd | Run docker-compose
          community.docker.docker_compose_v2:
            project_src: "{{ dococd_config_dir }}"
            files:
              - docker-compose.app.yaml
            build: always
            pull: always
            state: present
          when: not ansible_check_mode

        - name: doco-cd | Wait for akeyless-proxy healthy
          community.docker.docker_container_info:
            name: akeyless-proxy
          register: proxy_info
          until: proxy_info.container.State.Health.Status == "healthy"
          retries: 30
          delay: 5
          when: not ansible_check_mode

        - name: doco-cd | Wait for doco-cd healthy
          community.docker.docker_container_info:
            name: doco-cd
          register: dococd_info
          until: dococd_info.container.State.Health.Status == "healthy"
          retries: 30
          delay: 10
          when: not ansible_check_mode

    - name: pangolin
      become: false
      block:
        - name: pangolin | Wait for pangolin healthy (doco-cd deploys it, ~60s after first poll)
          community.docker.docker_container_info:
            name: pangolin
          register: pangolin_info
          until: pangolin_info.container is not none and pangolin_info.container.State.Health.Status == "healthy"
          retries: 60
          delay: 10
          when: not ansible_check_mode

        - name: pangolin | Set admin credentials
          community.docker.docker_container_exec:
            container: pangolin
            command: >
              node /app/dist/cli.mjs set-admin-credentials
              --email "{{ pangolin_admin_email }}"
              --password "{{ pangolin_admin_password }}"
          changed_when: false
          when: not ansible_check_mode

        - name: pangolin | Bootstrap org
          ansible.builtin.shell: |
            docker exec -i pangolin node - << 'JSEOF'
            const http = require('http');
            let cookie = '';

            function api(method, path, body) {
              return new Promise((resolve, reject) => {
                const data = body ? JSON.stringify(body) : null;
                const opts = {
                  hostname: 'localhost', port: 3000,
                  path: '/api/v1' + path, method,
                  headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': 'x-csrf-protection',
                    ...(cookie ? { Cookie: cookie } : {})
                  }
                };
                const req = http.request(opts, res => {
                  const sc = res.headers['set-cookie'];
                  if (sc) cookie = sc.map(c => c.split(';')[0]).join('; ');
                  let buf = '';
                  res.on('data', d => buf += d);
                  res.on('end', () => resolve(JSON.parse(buf)));
                });
                req.on('error', reject);
                if (data) req.write(data);
                req.end();
              });
            }

            async function main() {
              let r = await api('POST', '/auth/login',
                { email: '{{ pangolin_admin_email }}', password: '{{ pangolin_admin_password }}' });
              if (!r.success) { console.log('LOGIN_FAILED: ' + r.message); process.exit(1); }

              r = await api('PUT', '/org', {
                orgId: '{{ pangolin_org_id }}', name: '{{ pangolin_org_name }}',
                subnet: '{{ pangolin_org_subnet }}', utilitySubnet: '{{ pangolin_org_utility_subnet }}'
              });
              if (!r.success && !r.message.includes('already exists')) {
                console.log('ORG_FAILED: ' + r.message); process.exit(1);
              }
              console.log('ORG_OK');
            }

            main().catch(e => { console.log('ERROR: ' + e.message); process.exit(1); });
            JSEOF
          args:
            executable: /bin/bash
          register: pangolin_bootstrap
          changed_when: false
          failed_when: "'ERROR' in pangolin_bootstrap.stdout or 'FAILED' in pangolin_bootstrap.stdout"
          when: not ansible_check_mode

    - name: crowdsec
      become: false
      block:
        - name: crowdsec | Wait for crowdsec healthy
          community.docker.docker_container_info:
            name: crowdsec
          register: crowdsec_info
          until: crowdsec_info.container is defined and crowdsec_info.container.State.Health.Status == "healthy"
          retries: 30
          delay: 10
          when: not ansible_check_mode

        - name: crowdsec | Get existing bouncers
          community.docker.docker_container_exec:
            container: crowdsec
            command: cscli bouncers list -o json
          register: crowdsec_bouncers
          changed_when: false
          when: not ansible_check_mode

        - name: crowdsec | Register Traefik bouncer
          community.docker.docker_container_exec:
            container: crowdsec
            command: >
              cscli bouncers add traefik --key "{{ crowdsec_traefik_api_key }}"
          when:
            - not ansible_check_mode
            - "'traefik' not in (crowdsec_bouncers.stdout | default(''))"

        - name: crowdsec | Enroll instance in CrowdSec console
          community.docker.docker_container_exec:
            container: crowdsec
            command: cscli console enroll {{ crowdsec_enroll_key }} --name vps
          changed_when: false
          when: not ansible_check_mode

    - name: unfbkup
      block:
        - name: unfbkup | Read restic secrets from aKeyless
          ansible.builtin.shell: "akeyless get-secret-value --name '{{ item }}'"
          delegate_to: localhost
          loop:
            - docker/vps-unifi/restic-repository
            - docker/vps-unifi/restic-password
            - docker/vps-unifi/b2-account-id
            - docker/vps-unifi/b2-account-key
          check_mode: false
          changed_when: false
          no_log: true
          register: restic_secrets_raw

        - name: unfbkup | Set restic secret facts
          ansible.builtin.set_fact:
            restic_repository: "{{ restic_secrets_raw.results[0].stdout }}"
            restic_password: "{{ restic_secrets_raw.results[1].stdout }}"
            b2_account_id: "{{ restic_secrets_raw.results[2].stdout }}"
            b2_account_key: "{{ restic_secrets_raw.results[3].stdout }}"
          no_log: true

        - name: unfbkup | Initialize restic B2 repository (idempotent)
          ansible.builtin.shell: |
            docker run --rm \
              -e RESTIC_REPOSITORY="{{ restic_repository }}" \
              -e RESTIC_PASSWORD="{{ restic_password }}" \
              -e B2_ACCOUNT_ID="{{ b2_account_id }}" \
              -e B2_ACCOUNT_KEY="{{ b2_account_key }}" \
              docker.io/restic/restic:0.17.3@sha256:80361423ec2beca5646ff0a94aed3f28ac9ad7a6742fb24f66e617359b9754ce init
          register: restic_init
          failed_when:
            - restic_init.rc != 0
            - "'already initialized' not in restic_init.stderr"
            - "'config file already exists' not in restic_init.stderr"
          changed_when: restic_init.rc == 0
          no_log: true

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "=== Bootstrap complete ==="
          - "VPS IP      : {{ inventory_hostname }}"
          - "Dashboard   : https://{{ pangolin_hostname }}"
          - "SSH port    : {{ host_ssh_port }}"
          - "doco-cd UI  : https://doco.{{ pangolin_hostname }}"

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart ssh.socket
      ansible.builtin.service:
        name: ssh.socket
        state: restarted
