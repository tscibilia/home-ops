- name: Bootstrap Unraid doco-cd
  hosts: all
  gather_facts: false
  vars:
    ansible_user: root
    ansible_python_interpreter: auto_silent
    dococd_config_dir: /mnt/user/appdata/doco-cd

  tasks:
    - name: Check host connectivity
      ansible.builtin.raw: echo pong

    - name: Read secrets from aKeyless
      ansible.builtin.shell: "akeyless get-secret-value --name '{{ item }}'"
      delegate_to: localhost
      loop:
        - docker/doco-cd/github-token
        - docker/doco-cd/akeyless-access-id
        - docker/doco-cd/akeyless-access-key
        - /docker/unraid/tailscale-auth-key
      check_mode: false
      changed_when: false
      no_log: true
      register: secrets_raw

    - name: Set secret facts
      ansible.builtin.set_fact:
        doco_github_token: "{{ secrets_raw.results[0].stdout }}"
        doco_akeyless_access_id: "{{ secrets_raw.results[1].stdout }}"
        doco_akeyless_access_key: "{{ secrets_raw.results[2].stdout }}"
        tailscale_auth_key: "{{ secrets_raw.results[3].stdout }}"
      no_log: true

    - name: doco-cd | Create config directory
      ansible.builtin.raw: mkdir -p {{ dococd_config_dir }} && chmod 700 {{ dococd_config_dir }}

    - name: doco-cd | Copy docker-compose app file
      ansible.builtin.raw: |
        cat > {{ dococd_config_dir }}/docker-compose.app.yaml << 'DOCO_CD_EOF'
        {{ lookup('file', '../../docker/unraid/.doco-cd/docker-compose.app.yaml') }}
        DOCO_CD_EOF

    - name: doco-cd | Copy cron-update.sh
      ansible.builtin.raw: |
        cat > {{ dococd_config_dir }}/cron-update.sh << 'DOCO_CD_EOF'
        {{ lookup('file', '../../docker/unraid/.doco-cd/cron-update.sh') }}
        DOCO_CD_EOF
        chmod 755 {{ dococd_config_dir }}/cron-update.sh

    - name: doco-cd | Create secret files
      ansible.builtin.raw: >-
        printf '%s' {{ item.content | b64encode | quote }} | base64 -d
        > {{ dococd_config_dir }}/{{ item.name }} &&
        chmod 600 {{ dococd_config_dir }}/{{ item.name }}
      no_log: true
      loop:
        - name: gh_token
          content: "{{ doco_github_token }}"
        - name: akeyless_access_id
          content: "{{ doco_akeyless_access_id }}"
        - name: akeyless_access_key
          content: "{{ doco_akeyless_access_key }}"
        - name: tailscale_auth_key
          content: "{{ tailscale_auth_key }}"

    - name: doco-cd | Install nightly update cron job
      ansible.builtin.raw: >-
        (crontab -l 2>/dev/null | grep -v 'doco-cd stack update';
        echo "0 3 * * * {{ dococd_config_dir }}/cron-update.sh") | crontab -

    - name: doco-cd | Ensure doco-cd Docker network exists
      ansible.builtin.raw: docker network inspect doco-cd >/dev/null 2>&1 || docker network create doco-cd
      when: not ansible_check_mode

    - name: doco-cd | Get image from docker-compose app file
      ansible.builtin.raw: >-
        grep 'image:' {{ dococd_config_dir }}/docker-compose.app.yaml | grep 'doco-cd' | awk '{print $2}'
      register: doco_image
      when: not ansible_check_mode

    - name: doco-cd | Deploy container
      ansible.builtin.raw: |
        docker pull {{ doco_image.stdout | trim }}
        docker stop doco-cd 2>/dev/null || true
        docker rm doco-cd 2>/dev/null || true
        docker run -d \
          --name doco-cd \
          --restart unless-stopped \
          --network doco-cd \
          -v /var/run/docker.sock:/var/run/docker.sock:ro \
          -v data:/data \
          -v {{ dococd_config_dir }}/gh_token:/run/secrets/gh_token:ro \
          -e LOG_LEVEL=info \
          -e DEPLOY_CONFIG_BASE_DIR=./docker/unraid/ \
          -e TZ=America/New_York \
          -e POLL_CONFIG="$(printf '- url: https://github.com/tscibilia/home-ops.git\n  reference: refs/heads/main\n  interval: 3600')" \
          {{ doco_image.stdout | trim }}
      when: not ansible_check_mode
