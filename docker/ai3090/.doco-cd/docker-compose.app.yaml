---
# This file is not managed by doco-cd because it can't manage itself.
# A cron job on ai3090 fetches docker-compose.app.yaml from GitHub,
# compares hashes, and does `docker compose up -d` only when something changed.

secrets:
  gh_token:
    file: /home/ubuntu/.config/doco-cd/gh_token

services:
  doco-cd:
    image: ghcr.io/kimdre/doco-cd:0.78.0@sha256:52710cc3c09ee5e8a9397097ddfe211aba4d6874a84f464da0d29e953f890ee2
    container_name: doco-cd
    restart: unless-stopped
    networks:
      - doco-cd
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - data:/data
    environment:
      LOG_LEVEL: info
      DEPLOY_CONFIG_BASE_DIR: ./docker/ai3090/
      POLL_CONFIG: |-
        - url: https://github.com/tscibilia/home-ops.git
          reference: refs/heads/main
          interval: 3600
      TZ: America/New_York
    healthcheck:
      test:
        - CMD
        - /doco-cd
        - healthcheck
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
    secrets:
      - gh_token

networks:
  doco-cd:
    external: true

volumes:
  data: {}
