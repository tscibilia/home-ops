---
services:
  scrutiny-collector:
    image: ghcr.io/analogj/scrutiny:v0.9.0-collector@sha256:3ff9e9ba8c0c4dbb83a3537222de8eb1be4115b38a14ec4f57004684973308df
    container_name: scrutiny-collector
    restart: unless-stopped
    networks:
      - doco-cd
    cap_add:
      - SYS_RAWIO    # required for smartctl ATA/NVMe queries
      - SYS_ADMIN    # required for NVMe device access
    devices:
      - /dev/nvme0:/dev/nvme0
      # Add HDDs here if attached, e.g.: - /dev/sda:/dev/sda
    volumes:
      - /run/udev:/run/udev:ro
    environment:
      COLLECTOR_API_ENDPOINT: http://scrutiny.internal
      COLLECTOR_HOST_ID: ai3090

networks:
  doco-cd:
    external: true
