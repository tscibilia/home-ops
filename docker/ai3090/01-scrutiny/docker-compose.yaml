---
services:
  scrutiny-collector:
    image: ghcr.io/analogj/scrutiny:v0.9.1-collector@sha256:6c238e9996e8b19dc64916d32d2a0be1dc0619907fc107d7d437f8a5be8449ac
    container_name: scrutiny-collector
    restart: unless-stopped
    networks:
      - doco-cd
    cap_add:
      - SYS_RAWIO    # required for smartctl ATA/NVMe queries
      - SYS_ADMIN    # required for NVMe device access
    devices:
      - /dev/nvme0:/dev/nvme0
      # Add HDDs here if attached, e.g.: - /dev/sda:/dev/sda
    volumes:
      - /run/udev:/run/udev:ro
    environment:
      COLLECTOR_API_ENDPOINT: http://scrutiny.internal
      COLLECTOR_HOST_ID: ai3090

networks:
  doco-cd:
    external: true
