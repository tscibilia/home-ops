---
services:
  scrutiny-collector:
    image: ghcr.io/analogj/scrutiny:v0.9.2-collector@sha256:a0ba60a1f3734ef82871c658a7e5545fd6b70b560935c451149ec102e35bb054
    container_name: scrutiny-collector
    restart: unless-stopped
    networks:
      - doco-cd
    cap_add:
      - SYS_RAWIO    # required for smartctl ATA/NVMe queries
      - SYS_ADMIN    # required for NVMe device access
    devices:
      - /dev/nvme0:/dev/nvme0
      # Add HDDs here if attached, e.g.: - /dev/sda:/dev/sda
    volumes:
      - /run/udev:/run/udev:ro
    environment:
      COLLECTOR_API_ENDPOINT: http://scrutiny.internal
      COLLECTOR_HOST_ID: ai3090

networks:
  doco-cd:
    external: true
