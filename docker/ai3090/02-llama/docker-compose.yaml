---
services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:2b3893e47dd227d24d462d4f307cc2ad0bb4d8c29044ff42877b031672344f1f
    container_name: llama-server
    restart: unless-stopped
    networks:
      - doco-cd
    ports:
      - "10000:10000"
    volumes:
      - /home/ubuntu/models:/models:ro
    environment:
      # Update LLAMA_ARG_MODEL when changing models
      LLAMA_ARG_MODEL: /models/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: "10000"
      LLAMA_ARG_N_GPU_LAYERS: "99"
      LLAMA_ARG_CTX_SIZE: "8192"
      LLAMA_ARG_PARALLEL: "4"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s    # GPU model load can take 30-90s

networks:
  doco-cd:
    external: true
