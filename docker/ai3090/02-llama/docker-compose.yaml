---
services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:aa125372d3e4c09dd4e79b556341032cc90d0634f6070714b0a37281d3e40a1c
    container_name: llama-server
    restart: unless-stopped
    networks:
      - doco-cd
    ports:
      - "10000:10000"
    volumes:
      - /home/ubuntu/models:/models:ro
    environment:
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: "10000"
      LLAMA_ARG_N_GPU_LAYERS: "99"
      LLAMA_ARG_CTX_SIZE: "65536"
      LLAMA_ARG_PARALLEL: "3"
      # Update when changing models and Unsloth recommended sampling params
      LLAMA_ARG_MODEL: /models/gemma-4-26B-A4B-it-UD-Q5_K_XL-GGUF/gemma-4-26B-A4B.gguf
      LLAMA_ARG_MMPROJ: /models/gemma-4-26B-A4B-it-UD-Q5_K_XL-GGUF/mmproj-BF16.gguf
      LLAMA_ARG_TEMP: "1.0"
      LLAMA_ARG_TOP_P: "0.95"
      LLAMA_ARG_TOP_K: "64"
      # KV cache quantization flag
      LLAMA_ARG_CACHE_TYPE_K: q4_0
      LLAMA_ARG_CACHE_TYPE_V: q4_0
      # Disable thinking mode (set to true to enable)
      # LLAMA_ARG_CHAT_TEMPLATE_KWARGS: '{"enable_thinking":false}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s    # GPU model load can take 30-90s

networks:
  doco-cd:
    external: true
