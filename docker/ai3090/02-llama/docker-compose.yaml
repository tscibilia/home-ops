---
services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:ee54620034076d53fee9cd6acf8483902becd3d66acf77acc6ecfe5eefddaecb
    container_name: llama-server
    restart: unless-stopped
    networks:
      - doco-cd
    ports:
      - "10000:10000"
    volumes:
      - /home/ubuntu/models:/models:ro
    environment:
      # Update LLAMA_ARG_MODEL when changing models
      LLAMA_ARG_MODEL: /models/Gemma-4-26B-A4B-it-UD-Q5_K_XL.gguf
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: "10000"
      LLAMA_ARG_N_GPU_LAYERS: "99"
      LLAMA_ARG_CTX_SIZE: "32768"
      LLAMA_ARG_PARALLEL: "3"
      # KV cache quantization flag
      LLAMA_ARG_CACHE_TYPE_K: q4_0
      LLAMA_ARG_CACHE_TYPE_V: q4_0
      # Unsloth recommended sampling params for Gemma-4-26B reasoning tasks
      LLAMA_ARG_TEMP: "1.0"
      LLAMA_ARG_TOP_P: "0.95"
      LLAMA_ARG_TOP_K: "64"
      # Disable thinking mode (set to true to enable)
      # LLAMA_ARG_CHAT_TEMPLATE_KWARGS: '{"enable_thinking":false}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s    # GPU model load can take 30-90s

networks:
  doco-cd:
    external: true
