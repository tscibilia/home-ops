---
name: pangolin
services:
  pangolin:
    image: ghcr.io/fosrl/pangolin:1.19.0@sha256:2be3ebdb9e0794323485511967d60b4deaa83e7541f44b266508703a8c3f1b08
    container_name: pangolin
    restart: unless-stopped
    environment:
      - SERVER_SECRET=${PANGOLIN_SERVER_SECRET}
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - /opt/pangolin/config:/app/config
    configs:
      - source: pangolin_config
        target: /app/config/config.yml
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3001/api/v1/
      interval: 10s
      timeout: 10s
      retries: 15

  crowdsec:
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.8@sha256:2f527c9bb8b367120eb08b82890aa912ce96bfa1ada93dda0721700e4b4e0dde
    container_name: crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      ENROLL_INSTANCE_NAME: vps-crowdsec
      ENROLL_TAGS: docker
      GID: "1000"
      PARSERS: crowdsecurity/whitelists
    healthcheck:
      test:
        - CMD
        - cscli
        - lapi
        - status
      interval: 10s
      retries: 3
      start_period: 30s
      timeout: 5s
    labels:
      - traefik.enable=false
    ports:
      - 6060:6060
    volumes:
      - /opt/crowdsec/config:/etc/crowdsec
      - /opt/crowdsec/data:/var/lib/crowdsec/data
      - /opt/pangolin/config/traefik/logs:/var/log/traefik:ro
    configs:
      - source: crowdsec_acquis
        target: /etc/crowdsec/acquis.yaml
      - source: crowdsec_allowlist
        target: /etc/crowdsec/parsers/s02-enrich/my-allowlists.yaml
      - source: crowdsec_ban_ai_crawlers
        target: /etc/crowdsec/scenarios/ban-ai-crawlers.yaml
      - source: crowdsec_ban_asn
        target: /etc/crowdsec/scenarios/ban-asn.yaml

  gerbil:
    image: ghcr.io/fosrl/gerbil:1.4.1@sha256:1d462197478cef9eb7c6e7f8b9aa1b6bef82073ec5e4e81f1ad87069f330731b
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - /opt/pangolin/config/:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 22:22
      - 443:443
      - 80:80
      - 4443:4443

  traefik:
    image: ghcr.io/traefik/traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    container_name: traefik
    restart: unless-stopped
    environment:
      - CLOUDFLARE_DNS_API_TOKEN=${CF_CLOUDFLARE_TOKEN}
      - CROWDSEC_API_KEY=${CROWDSEC_TRAEFIK_API_KEY}
      - DOMAIN=${DOMAIN}
    network_mode: service:gerbil
    depends_on:
      crowdsec:
        condition: service_healthy
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - /opt/pangolin/config/letsencrypt:/letsencrypt
      - /opt/pangolin/config/traefik/logs:/var/log/traefik
    configs:
      - source: traefik_config
        target: /etc/traefik/traefik_config.yml
      - source: traefik_dynamic_config
        target: /etc/traefik/dynamic_config.yml

  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:v7.1.1@sha256:faecdca22579730ab0b7dea5aa9af350bb3c93cb9d39845c173639ead30346d2
    container_name: geoipupdate
    restart: unless-stopped
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_PANGOLIN_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-Country GeoLite2-ASN
      - GEOIPUPDATE_FREQUENCY=72
    volumes:
      - /opt/pangolin/config/GeoLite2:/usr/share/GeoIP

networks:
  default:
    driver: bridge
    name: pangolin

configs:
  pangolin_config:
    content: |
      gerbil:
        start_port: 51820
        base_endpoint: "tun.${DOMAIN}"
      app:
        dashboard_url: "https://tun.${DOMAIN}"
        log_level: "info"
        telemetry:
          anonymous_usage: false
      domains:
        domain1:
          base_domain: "${DOMAIN}"
          cert_resolver: "letsencrypt"
        domain2:
          base_domain: "${CEAPP_DOMAIN}"
          cert_resolver: "letsencrypt"
      server:
        cors:
          origins:
            - "https://tun.${DOMAIN}"
          methods:
            - "GET"
            - "POST"
            - "PUT"
            - "DELETE"
            - "PATCH"
          allowed_headers:
            - "X-CSRF-Token"
            - "Content-Type"
          credentials: false
        maxmind_db_path: "/app/config/GeoLite2/GeoLite2-Country.mmdb"
        maxmind_asn_path: "/app/config/GeoLite2/GeoLite2-ASN.mmdb"
      flags:
        require_email_verification: false
        disable_signup_without_invite: true
        disable_user_create_org: false
        allow_raw_resources: true
        enable_integration_api: true
  crowdsec_acquis:
    file: ./config/crowdsec/acquis.yaml
  crowdsec_allowlist:
    content: |
      name: custom/home-allowlist
      description: "Allow home ISP"
      whitelist:
        reason: "Home ISP"
        expression:
          - IpInRange(evt.Meta.SourceIP, "${HOME_IP_CIDR}")
  crowdsec_ban_ai_crawlers:
    file: ./config/crowdsec/ban_ai_crawlers.yaml
  crowdsec_ban_asn:
    file: ./config/crowdsec/ban_asn.yaml
  traefik_config:
    file: ./config/traefik/traefik_config.yaml
  traefik_dynamic_config:
    file: ./config/traefik/dynamic_config.yml
