name: unifi

services:
  unifi-db:
    # renovate: datasource=docker depName=docker.io/mongo
    image: docker.io/mongo:8.2
    container_name: unifi-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
    volumes:
      - /opt/unifi/db:/data/db
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" --quiet || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  unifi-network-application:
    # renovate: datasource=docker depName=lscr.io/linuxserver/unifi-network-application
    image: lscr.io/linuxserver/unifi-network-application:9.5.21
    container_name: unifi-network-application
    restart: unless-stopped
    depends_on:
      unifi-db:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/New_York
      MONGO_USER: ${MONGO_USER}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_HOST: unifi-db
      MONGO_PORT: "27017"
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
      MEM_LIMIT: "1024"
      MEM_STARTUP: "512"
    volumes:
      - /opt/unifi/config:/config
    ports:
      - 8080:8080
      - 8843:8843
      - 6789:6789
      - 3478:3478/udp
      - 10001:10001/udp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -k https://localhost:8443 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
    name: pangolin
    external: true
