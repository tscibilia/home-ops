name: unifi

services:
  unifi-db:
    image: docker.io/mongo:8.3@sha256:8dbb3db48a72084457272d33d398ae0ef7db8e7c9e12815a295c3417c8df6d38
    container_name: unifi-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
    volumes:
      - /opt/unifi/db:/data/db
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" --quiet || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  unifi-network-application:
    image: ghcr.io/linuxserver/unifi-network-application:10.3.58@sha256:71d3c32763e6a00d2e1924a7c42fa13e0b9e199ca4d2f7d660bdd514aeff5ef7
    container_name: unifi-network-application
    restart: unless-stopped
    depends_on:
      unifi-db:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/New_York
      MONGO_USER: ${MONGO_USER}
      MONGO_PASS: ${MONGO_PASS}
      MONGO_HOST: unifi-db
      MONGO_PORT: "27017"
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
      MEM_LIMIT: "1024"
      MEM_STARTUP: "512"
    volumes:
      - /opt/unifi/config:/config
    ports:
      - 8080:8080
      - 8843:8843
      - 6789:6789
      - 3478:3478/udp
      - 10001:10001/udp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -k https://localhost:8443 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
    name: pangolin
    external: true
