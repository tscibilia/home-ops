---
services:
  scrutiny-collector:
    image: ghcr.io/analogj/scrutiny:v0.9.1-collector@sha256:6c238e9996e8b19dc64916d32d2a0be1dc0619907fc107d7d437f8a5be8449ac
    container_name: scrutiny-collector
    restart: unless-stopped
    cap_add:
      - SYS_RAWIO    # required for smartctl ATA passthrough
      - SYS_ADMIN    # required for smartctl device access
    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/sdc:/dev/sdc
      - /dev/sdd:/dev/sdd
      - /dev/sde:/dev/sde
      - /dev/sdf:/dev/sdf
      - /dev/sdg:/dev/sdg
      - /dev/sdh:/dev/sdh
      - /dev/sdi:/dev/sdi
      - /dev/sdj:/dev/sdj
      - /dev/sdk:/dev/sdk
      - /dev/sdl:/dev/sdl
      - /dev/sdm:/dev/sdm
      - /dev/sdn:/dev/sdn
    volumes:
      - /run/udev:/run/udev:ro
    networks:
      - doco-cd
    environment:
      COLLECTOR_API_ENDPOINT: http://scrutiny.internal
      COLLECTOR_HOST_ID: unraid

networks:
  doco-cd:
    external: true
