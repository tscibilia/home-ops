---
version: "3.8"

services:
  scrutiny-collector:
    image: ghcr.io/analogj/scrutiny:v0.8.6-collector@sha256:c5228c99119a708e23f6235619273ae8d03735ba2a283aa97ecb5085787ea0f7
    container_name: scrutiny-collector
    restart: unless-stopped
    networks:
      - doco-cd
    cap_add:
      - SYS_RAWIO    # required for smartctl SMART queries
      - SYS_ADMIN    # required for NVMe (/dev/nvme0)
    volumes:
      - /dev:/dev    # bind-mount avoids runc cgroup "p" type error on TrueNAS kernel
      - /run/udev:/run/udev:ro
    device_cgroup_rules:
      - 'b 8:* r'    # /dev/sda-sdd (SATA, major 8)
      - 'b 259:* r'  # /dev/nvme0 (NVMe, major 259)
    environment:
      COLLECTOR_API_ENDPOINT: http://scrutiny.internal
      COLLECTOR_HOST_ID: truenas

networks:
  doco-cd:
    external: true
