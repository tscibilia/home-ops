---
name: exporters
services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.12.0
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - --path.rootfs=/host/root
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --no-collector.edac
    volumes:
      - /:/host/root:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:5.0
    container_name: fluent-bit
    restart: unless-stopped
    network_mode: host
    hostname: clonenas
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/conf/fluent-bit.conf"]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - fluent-bit-data:/fluent-bit/data
    configs:
      - source: fluent_bit_config
        target: /fluent-bit/etc/conf/fluent-bit.conf
      - source: fluent_bit_enrich
        target: /fluent-bit/etc/conf/enrich.lua

  nut-server:
    image: instantlinux/nut-upsd:latest
    container_name: nut-server
    restart: unless-stopped
    network_mode: host
    privileged: true
    configs:
      - source: nut_conf
        target: /etc/nut/nut.conf
        mode: 0644
      - source: ups_conf
        target: /etc/nut/ups.conf
        mode: 0644
      - source: upsd_conf
        target: /etc/nut/upsd.conf
        mode: 0644
      - source: upsd_users
        target: /etc/nut/upsd.users
        mode: 0640
      - source: upsmon_conf
        target: /etc/nut/upsmon.conf
        mode: 0640

volumes:
  fluent-bit-data:

configs:
  fluent_bit_config:
    content: |
      [SERVICE]
          Daemon Off
          Flush 5
          Log_Level info
          Parsers_File /fluent-bit/etc/parsers.conf

      [INPUT]
          Name tail
          Path /var/lib/docker/containers/*/*-json.log
          Parser docker
          Tag docker
          Path_Key filename
          Refresh_Interval 5
          Mem_Buf_Limit 10MB
          Skip_Long_Lines On
          DB /fluent-bit/data/docker.db

      [FILTER]
          Name lua
          Match docker
          Script /fluent-bit/etc/conf/enrich.lua
          call enrich_container_name

      [FILTER]
          Name log_to_metrics
          Match docker
          Tag node_metrics
          Metric_Name container_log_errors_total
          metric_mode counter
          metric_description Container log error count
          regex log (?i)error
          Label_Field container
          Label_Field host

      [FILTER]
          Name log_to_metrics
          Match docker
          Tag node_metrics
          Metric_Name container_log_warnings_total
          metric_mode counter
          metric_description Container log warning count
          regex log (?i)warn
          Label_Field container
          Label_Field host

      [OUTPUT]
          Name prometheus_exporter
          Match node_metrics
          Host 0.0.0.0
          Port 2020

      [OUTPUT]
          Name null
          Match docker

  fluent_bit_enrich:
    content: |
      function enrich_container_name(tag, timestamp, record)
          local filename = record["filename"]
          if filename then
              local container_id = filename:match("/containers/([^/]+)/")
              if container_id then
                  local config_path = "/var/lib/docker/containers/" .. container_id .. "/config.v2.json"
                  local f = io.open(config_path, "r")
                  if f then
                      local content = f:read("*all")
                      f:close()
                      local name = content:match('"Name":"/?([^"]+)"')
                      if name then
                          record["container"] = name
                      end
                  end
                  if not record["container"] then
                      record["container"] = container_id
                  end
              end
              record["filename"] = nil
          end
          record["host"] = "clonenas"
          return 1, timestamp, record
      end

  nut_conf:
    content: "MODE=netserver\n"

  ups_conf:
    content: |
      [clonenas_ups]
        driver = usbhid-ups
        port = auto
        vendorid = 0764
        productid = 0601
        desc = "CyberPower PR1500LCDRT2U"

  upsd_conf:
    content: "LISTEN 0.0.0.0 3493\n"

  upsd_users:
    content: |
      [monitor]
        password = ${NUT_MONITOR_PASSWORD}
        upsmon master

  upsmon_conf:
    content: |
      MONITOR clonenas_ups@localhost 1 monitor ${NUT_MONITOR_PASSWORD} master
      MINSUPPLIES 1
      SHUTDOWNCMD "/sbin/shutdown -h +0"
      POLLFREQ 5
      POLLFREQALERT 5
      HOSTSYNC 15
      DEADTIME 15
      POWERDOWNFLAG /etc/killpower
      RBWARNTIME 43200
      NOCOMMWARNTIME 300
      FINALDELAY 5
