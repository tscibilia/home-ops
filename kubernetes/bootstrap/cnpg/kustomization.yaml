---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: database
resources:
  # PostgreSQL cluster
  - ../../apps/database/cnpg/pgsql-cluster
  # PostgreSQL pgvector cluster
  - ../../apps/database/cnpg/pgvector-cluster
patches:
  # Add recovery for pgsql-cluster
  - patch: |-
      - op: add
        path: /spec/bootstrap
        value:
          recovery:
            source: source
      - op: add
        path: /spec/externalClusters
        value:
          - name: source
            plugin:
              name: barman-cloud.cloudnative-pg.io
              parameters:
                barmanObjectName: pgsql-cluster
                serverName: pgsql-cluster
    target:
      kind: Cluster
      name: pgsql-cluster
  # Add recovery for pgvector-cluster
  - patch: |-
      - op: add
        path: /spec/bootstrap
        value:
          recovery:
            source: source
      - op: add
        path: /spec/externalClusters
        value:
          - name: source
            plugin:
              name: barman-cloud.cloudnative-pg.io
              parameters:
                barmanObjectName: pgvector-cluster
                serverName: pgvector-cluster
    target:
      kind: Cluster
      name: pgvector-cluster
