---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dragonfly-operator
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/dragonflydb/operator
              tag: v1.6.1@sha256:b11411142935f92ed0ec30a5ddeb31680e09ab66beecb827cb0224f1c4238638
            command:
              - "/manager"
            args:
              - --health-probe-bind-address=:8081
              - --metrics-bind-address=:80
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec: &probeSpec
                  httpGet:
                    path: /healthz
                    port: &port 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                <<: *probes
                spec:
                  <<: *probeSpec
                  httpGet:
                    path: /readyz
                    port: *port
                  periodSeconds: 10
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 103
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        serviceAccount:
          identifier: *app
    defaultPodOptions:
      automountServiceAccountToken: true
      labels:
        # required for the operator to determine a primary in each deployed cluster
        # ref: https://deepwiki.com/dragonflydb/dragonfly-operator/2.2-manual-installation#namespace-resource
        control-plane: controller-manager
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: *app
    service:
      app:
        ports:
          http:
            port: *port
          metrics:
            port: 8080
    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              apiVersion: monitoring.coreos.com/v1
              kind: ServiceMonitor
              metadata:
                name: dragonfly-operator
                namespace: database
              spec:
                fallbackScrapeProtocol: PrometheusText1.0.0
          # To resolve the targetDown prom alert when the dragonfly-operator chart
          # default ia set `--metrics-bind-address=127.0.0.1:8080`
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: dragonfly-operator
              namespace: database
            patch: |-
              - op: replace
                path: /spec/template/spec/containers/1/args
                value:
                  - --health-probe-bind-address=:8081
                  - --metrics-bind-address=0.0.0.0:8080
                  - --leader-elect
