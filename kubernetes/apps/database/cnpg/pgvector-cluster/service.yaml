# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/service_v1.json
apiVersion: v1
kind: Service
metadata:
  name: pgvector-cluster
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "pgvector-cluster.${SECRET_DOMAIN}"
spec:
  type: ClusterIP
  selector:
    cnpg.io/cluster: pgvector-cluster
    cnpg.io/instanceRole: primary
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
