---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/grafana.integreatly.org/grafanaalertrulegroup_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaAlertRuleGroup
metadata:
  name: cnpg-barman-alerts
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folderUID: Logs
  interval: 5m
  rules:
    - uid: cnpg-barman-wal-archive-error
      title: CnpgBarmanWALArchiveError
      condition: C
      data:
        - refId: A
          queryType: range
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: victorialogs
          model:
            expr: |
              k_namespace_name:"database" AND k_container_name:"plugin-barman-cloud"
              | _msg:~"Failed archiving WAL"
            intervalMs: 60000
            maxDataPoints: 43200

        - refId: B
          queryType: ""
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            type: reduce
            expression: A
            reducer: count

        - refId: C
          queryType: ""
          relativeTimeRange:
            from: 1800
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
      annotations:
        summary: "Barman WAL archiving is failing"
        description: "barman-cloud failed to archive WAL in the last 30 minutes. Check plugin-barman-cloud container logs in the database namespace."
      labels:
        severity: critical
        app: cnpg
      for: 0m
      noDataState: OK
      execErrState: Alerting
