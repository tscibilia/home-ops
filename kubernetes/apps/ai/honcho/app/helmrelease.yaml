# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app honcho
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-initdb-secret"
            securityContext: &initSec
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
              readOnlyRootFilesystem: false
              allowPrivilegeEscalation: true
          02-migrate:
            image:
              repository: ghcr.io/plastic-labs/honcho
              tag: v3.0.7@sha256:5d9d2c53bcc0297de497634a3611728f81d171cc428cc93d74c1f07c405c2d33
            command:
              - /app/.venv/bin/alembic
              - upgrade
              - head
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext: *initSec
        containers:
          app:
            image: &honcho-image
              repository: ghcr.io/plastic-labs/honcho
              tag: v3.0.7@sha256:5d9d2c53bcc0297de497634a3611728f81d171cc428cc93d74c1f07c405c2d33
            env: &honcho-env
              CACHE_URL: "redis://dragonfly-cluster.database.svc.cluster.local:6379/6"
              CACHE_ENABLED: "true"
            envFrom: &honcho-envfrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec: &probeSpec
                  httpGet:
                    path: /health
                    port: &port 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probes
                spec:
                  <<: *probeSpec
                  periodSeconds: 10
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources: &honcho-resources
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext: &podSec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: [ALL] }
      deriver:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: *honcho-image
            command:
              - /app/.venv/bin/python
              - -m
              - src.deriver
            env: *honcho-env
            envFrom: *honcho-envfrom
            resources: *honcho-resources
            securityContext: *podSec
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      api:
        controller: api
        ports:
          http:
            port: *port
    persistence:
      initdb:
        type: configMap
        name: honcho-initdb
        globalMounts:
          - path: /initdb
            readOnly: true
