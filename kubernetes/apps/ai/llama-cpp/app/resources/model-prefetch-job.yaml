apiVersion: batch/v1
kind: Job
metadata:
  name: model-prefetch
  namespace: ai
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: llama-models
          nfs:
            server: truenas.internal
            path: /mnt/nas/data/shares
        - name: tmp
          emptyDir: {}
      containers:
        - name: prefetch
          image: ghcr.io/astral-sh/uv:python3.14-alpine
          env:
            - name: HOME
              value: /tmp
            - name: UV_CACHE_DIR
              value: /tmp/uv-cache
            - name: HF_HUB_CACHE
              value: /llama-models
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llama-cpp-secret
                  key: HF_TOKEN
          command:
            - /bin/sh
            - -ec
            - |
              uv venv /tmp/.venv
              uv pip install --no-cache --python /tmp/.venv/bin/python huggingface_hub
              export PATH="/tmp/.venv/bin:$PATH"
              hf download unsloth/gemma-4-26B-A4B-it-GGUF --include "*UD-IQ4_NL*.gguf"
              hf download unsloth/gemma-4-26B-A4B-it-GGUF mmproj-BF16.gguf
              hf download unsloth/Qwen3.6-27B-MTP-GGUF --include "*IQ4_NL*.gguf"
              hf download unsloth/Qwen3.6-27B-MTP-GGUF mmproj-F16.gguf
          volumeMounts:
            - name: llama-models
              mountPath: /llama-models
              subPath: llama-models
            - name: tmp
              mountPath: /tmp
