---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama-cpp
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          download-models:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.14-alpine
            env:
              HOME: /tmp
              UV_CACHE_DIR: /tmp/uv-cache
              HF_HUB_CACHE: /models
              HF_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: HF_TOKEN
            command:
              - /bin/sh
              - -ec
              - |
                uv venv --clear /tmp/.venv
                uv pip install --no-cache --python /tmp/.venv/bin/python huggingface_hub
                export PATH="/tmp/.venv/bin:$PATH"
                for ref in \
                  "unsloth/gemma-4-26B-A4B-it-GGUF" \
                  "unsloth/Qwen3.6-27B-MTP-GGUF"; do
                  name="models--$${ref//\//--}"
                  if [ ! -d "/models/$name" ] && [ -d "/llama-models/$name" ]; then
                    echo ">> restoring $name from NAS cache"
                    cp -r "/llama-models/$name" "/models/$name"
                  fi
                done
                download-model "unsloth/gemma-4-26B-A4B-it-GGUF:UD-IQ4_NL"
                download-model "unsloth/Qwen3.6-27B-MTP-GGUF:IQ4_NL"
                for d in /models/models--*/; do
                  [ -d "$d" ] || continue
                  name=$(basename "$d")
                  case "$name" in
                    models--unsloth--gemma-4-26B-A4B-it-GGUF|models--unsloth--Qwen3.6-27B-MTP-GGUF) ;;
                    *) echo ">> removing orphan: $name"; rm -rf "$d" ;;
                  esac
                done
                for ref in \
                  "unsloth/gemma-4-26B-A4B-it-GGUF" \
                  "unsloth/Qwen3.6-27B-MTP-GGUF"; do
                  name="models--$${ref//\//--}"
                  if [ -d "/models/$name" ] && [ ! -d "/llama-models/$name" ]; then
                    echo ">> caching $name to NAS"
                    cp -r "/models/$name" "/llama-models/$name"
                  fi
                done
                for d in /llama-models/models--*/; do
                  [ -d "$d" ] || continue
                  name=$(basename "$d")
                  case "$name" in
                    models--unsloth--gemma-4-26B-A4B-it-GGUF|models--unsloth--Qwen3.6-27B-MTP-GGUF) ;;
                    *) echo ">> removing orphan from NAS: $name"; rm -rf "$d" ;;
                  esac
                done
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda-b9982@sha256:7b3d7834fc7307cb54f24f8869b67bfff276404c416452a48d11321bc36a81be
            args:
              - --models-preset
              - &presetFile /config/presets.ini
              - --models-max
              - "1"
            env:
              LLAMA_ARG_HOST: 0.0.0.0
              LLAMA_ARG_PORT: &port 10000
              LLAMA_OFFLINE: "1"
            ports:
              - name: http
                containerPort: *port
                hostPort: *port
                protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 20Gi
                nvidia.com/gpu: "1"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec: &probeSpec
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probes
                spec:
                  <<: *probeSpec
                  periodSeconds: 10
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }
    defaultPodOptions:
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        feature.node.kubernetes.io/pci-10de.present: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    persistence:
      config:
        type: configMap
        name: llama-cpp-config
        globalMounts:
          - path: *presetFile
            subPath: presets.ini
            readOnly: true
      download-script:
        type: configMap
        name: llama-cpp-download-script
        defaultMode: 0o755
        advancedMounts:
          *app :
            download-models:
              - path: /usr/bin/download-model
                subPath: download-model.sh
                readOnly: true
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: openebs-hostpath
        advancedMounts:
          *app :
            app:
              - path: /models
                readOnly: true
            download-models:
              - path: /models
                readOnly: false
      model-cache:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/shares
        advancedMounts:
          *app :
            download-models:
              - path: /llama-models
                subPath: llama-models
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
