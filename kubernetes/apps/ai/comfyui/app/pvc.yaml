---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/persistentvolumeclaim_v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: comfyui
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-hdd
  volumeName: local-hdd-ai
  resources:
    requests:
      storage: 900Gi
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/persistentvolume_v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-hdd-ai
spec:
  capacity:
    storage: 900Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-hdd
  local:
    path: /var/mnt/local-hdd
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [ai3090]
