---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding-0.6b
spec:
  format: gguf
  hardware:
    accelerator: vulkan
    gpu:
      count: 1
      enabled: true
      layers: 99
      # Shareable /dev/dri render node advertised by generic-device-plugin.
      resourceName: kernel.org/dri-render
      vendor: intel
  quantization: Q8_0
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding-0.6b
spec:
  modelRef: qwen3-embedding-0.6b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9982@sha256:f1584bb85d807108dfa4d798682acfea3a30a12443c8cc006a70338eec932c6a
  replicas: 1
  nodeSelector:
    topology.kubernetes.io/zone: m
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: extensions.talos.dev/i915
                operator: Exists
  podSecurityContext:
    # 102 = curlimages/curl curl_group GID; makes the /models emptyDir
    # writable by the model-downloader init container (we override the
    # chart's default fsGroup by supplying podSecurityContext).
    fsGroup: 102
    supplementalGroups:
      - 44
      - 992
  # per-slot ctx = contextSize/parallelSlots; 2 slots = 4096, enough for long memini docs.
  contextSize: 8192
  parallelSlots: 2
  batchSize: 8192
  uBatchSize: 4096
  resources:
    gpu: 1
    cpu: 100m
    memory: 2Gi
  extraArgs:
    # Qwen3-Embedding uses last-token pooling with left padding;
    # --embedding + --pooling last exposes the OpenAI-compatible
    # /v1/embeddings endpoint.
    - --embedding
    - --pooling
    - last
    - --cache-ram
    - "0"
    - --no-mmap
    - --sleep-idle-seconds
    - "300"
    - --alias
    - qwen3-embedding-0.6b
    - --metrics
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
