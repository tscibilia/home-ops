---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: searxng-mcp
spec:
  alias: searxng_mcp
  params:
    allow_all_keys: true
  workload:
    # renovate: datasource=docker depName=docker.io/isokoliuk/mcp-searxng
    image: docker.io/isokoliuk/mcp-searxng:1.8.0@sha256:e19e276f50123dfaae990bb31a8ae62930ee466b716d70ddc16b9842b0327979
    port: 8080
    env:
      - name: SEARXNG_URL
        value: http://searxng.default.svc.cluster.local:8080
      - name: MCP_HTTP_PORT
        value: "8080"
      - name: MCP_HTTP_HOST
        value: 0.0.0.0
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: grafana-mcp
spec:
  alias: grafana_mcp
  params:
    allow_all_keys: true
  workload:
    image: mcp/grafana:latest
    port: 8000
    args: ["-t", "streamable-http", "--address", "0.0.0.0:8000", "--allowed-hosts", "*"]
    env:
      - name: GRAFANA_URL
        value: http://grafana-service.observability.svc.cluster.local:3000
      - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
        valueFrom:
          secretKeyRef:
            name: grafana-mcp-secret
            key: token
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: victoria-logs-mcp
spec:
  alias: victoria_logs_mcp
  params:
    allow_all_keys: true
  workload:
    image: ghcr.io/victoriametrics/mcp-victorialogs:latest
    port: 8081
    env:
      - name: MCP_SERVER_MODE
        value: http
      - name: MCP_LISTEN_ADDR
        value: :8081
      - name: MCP_LOG_FORMAT
        value: json
      - name: MCP_LOG_LEVEL
        value: info
      - name: VL_INSTANCE_ENTRYPOINT
        value: http://victoria-logs-server.observability.svc.cluster.local:9428
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: sidero-mcp
spec:
  alias: sidero_mcp
  url: https://docs.siderolabs.com/mcp
  transport: http
  params:
    allow_all_keys: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: deepwiki-mcp
spec:
  alias: deepwiki_mcp
  url: https://mcp.deepwiki.com/mcp
  transport: http
  params:
    allow_all_keys: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: context7-mcp
spec:
  alias: context7_mcp
  url: https://mcp.context7.com/mcp
  transport: http
  params:
    allow_all_keys: true
  authType: bearer_token
  authTokenRef:
    name: context7-mcp-secret
    key: CONTEXT7_API_KEY
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: talos-mcp
spec:
  alias: talos_mcp
  params:
    allow_all_keys: true
  workload:
    # renovate: datasource=docker depName=registry.erwanleboucher.dev/eleboucher/talos-mcp
    image: registry.erwanleboucher.dev/eleboucher/talos-mcp:0.0.2
    port: 8080
    env:
      - name: TALOS_MCP_TRANSPORT
        value: http
      - name: TALOS_MCP_HTTP_ADDR
        value: ":8080"
      - name: TALOSCONFIG
        value: /var/run/secrets/talos.dev/config
    volumes:
      - name: talosconfig
        secret:
          secretName: talos-mcp-talosconfig
          defaultMode: 0444
    volumeMounts:
      - name: talosconfig
        mountPath: /var/run/secrets/talos.dev
        readOnly: true
---
