---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: llama-qwen
spec:
  source: hf://unsloth/Qwen3.6-27B-MTP-GGUF
  files:
    - Qwen3.6-27B-IQ4_NL.gguf
  mmproj: mmproj-F16.gguf
  format: gguf
  quantization: IQ4_NL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      layers: 99
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-qwen
spec:
  modelRef: llama-qwen
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda-b9982@sha256:7b3d7834fc7307cb54f24f8869b67bfff276404c416452a48d11321bc36a81be
  rolloutPolicy:
    waitForIdle: true
    idleTimeoutSeconds: 3600
  replicas: 1
  priority: high
  runtimeClassName: nvidia
  nodeSelector:
    feature.node.kubernetes.io/pci-10de.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  env:
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
  contextSize: 148480
  batchSize: 2048
  uBatchSize: 512
  flashAttention: true
  cacheTypeK: q4_0
  cacheTypeV: q4_0
  jinja: true
  parallelSlots: 1
  reasoningBudget: 16384
  reasoningBudgetMessage: "Stop reasoning and produce the implementation, tool call, or final answer."
  resources:
    gpu: 1
    cpu: 100m
    memory: 20Gi
  endpoint:
    port: 8080
    type: ClusterIP
  extraArgs:
    - --sleep-idle-seconds
    - "3600"
    - --alias
    - openai/unsloth/Qwen3.6-27B
    - --cont-batching
    - --spec-type
    - draft-mtp
    - --spec-draft-p-min
    - "0.75"
    - --spec-draft-n-max
    - "2"
    - --spec-draft-type-k
    - q4_0
    - --spec-draft-type-v
    - q4_0
    - -sps
    - "0.75"
    - --cache-prompt
    - --cache-ram
    - "20480"
    - --kv-unified
    - --temp
    - "0.6"
    - --top-k
    - "20"
    - --top-p
    - "0.8"
    - --min-p
    - "0.0"
    - --presence-penalty
    - "0.5"
    - --repeat-penalty
    - "1.03"
    - --mmap
    - --chat-template-kwargs
    - '{"preserve_thinking":true}'
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
