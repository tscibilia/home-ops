---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: hass
spec:
  image: ghcr.io/homeassistant-ai/ha-mcp:7.8.1
  transport: streamable-http
  groupRef:
    name: mcp-int
  env:
    - name: HOMEASSISTANT_URL
      value: http://home-assistant.home-automation.svc.cluster.local:8123
  secrets:
    - name: hass-mcp-secret
      key: HOMEASSISTANT_TOKEN
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - ha-mcp-web
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
