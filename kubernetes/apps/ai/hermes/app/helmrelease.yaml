---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-agent-source:
            image: &img
              repository: nousresearch/hermes-agent
              tag: v2026.6.19@sha256:9f367c7756ef087661a361536a89f438d57a122b958dc23d82d456b1433e6e9e
            command:
              - /bin/sh
              - -c
              - |
                set -e
                cp -r /opt/hermes/. /agent-src/
                chown -R 10000:10000 /agent-src/
                chmod -R u+rwX /agent-src/plugins/
            securityContext:
              allowPrivilegeEscalation: true
              runAsGroup: 0
              runAsUser: 0
          02-init-config:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data
                cp /run/config/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              runAsGroup: &uid 10000
              runAsUser: *uid
          03-install-tools:
            image: *img
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /opt/data/.local/bin /opt/data/.local/go

                rm -f /opt/data/.local/bin/hermes /opt/data/.local/bin/docker

                if [ ! -f /opt/data/.local/bin/gh ]; then
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /opt/data/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                if [ ! -f /opt/data/.local/go/bin/go ]; then
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.23.5.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz
                  mv go /opt/data/.local/
                  rm -rf go.tar.gz
                fi

                if [ ! -f /opt/data/.local/homebrew/bin/brew ]; then
                  export HOMEBREW_PREFIX=/opt/data/.local/homebrew
                  mkdir -p $HOMEBREW_PREFIX
                  git clone --depth 1 https://github.com/Homebrew/brew $HOMEBREW_PREFIX
                fi

                if [ -f /opt/hermes/plugins/platforms/photon/sidecar/package.json ]; then
                  cd /opt/hermes/plugins/platforms/photon/sidecar && npm ci 2>/dev/null || npm install
                fi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              runAsGroup: &uid 10000
              runAsUser: *uid
        containers:
          app:
            image: *img
            args: ["gateway", "run"]
            env:
              API_SERVER_ENABLED: true
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_PORT: &apiPort 8642
              HERMES_HOME: /opt/data
              HOME: /opt/data
              HERMES_DASHBOARD: true
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_PORT: &dashPort 9119
              HERMES_DASHBOARD_INSECURE: true
              HOMEBREW_CELLAR: /opt/data/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /opt/data/.local/homebrew
              HOMEBREW_REPOSITORY: /opt/data/.local/homebrew
              GATEWAY_ALLOW_ALL_USERS: true
              GOPATH: /opt/data/go
              PATH: /opt/hermes/bin:/opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              MEMINI_URL: http://memini.ai.svc.cluster.local:8080
              MEMINI_NAMESPACE: ai
              SEARXNG_URL: http://searxng.default.svc.cluster.local:8080
              TERM: xterm-256color
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec: &probeSpec
                  httpGet:
                    path: ${GATUS_PATH}
                    port: *dashPort
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                <<: *probes
                spec:
                  <<: *probeSpec
                  periodSeconds: 10
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 4Gi
            # The image entrypoint starts as root for s6/permission setup, then
            # drops gateway execution to the non-root hermes user.
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        fsGroup: *uid
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *dashPort
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *dashPort
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app :
            02-init-config:
              - path: /opt/data
            03-install-tools:
              - path: /opt/data
            app:
              - path: /opt/data
      config:
        type: configMap
        name: "{{ .Release.Name }}-configmap"
        defaultMode: 0o755
        globalMounts:
          - path: /run/config/config.yaml
            subPath: config.yaml
      nfs:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/shares/hermes
        globalMounts:
          - path: /nfs-data
      agent-source:
        type: emptyDir
        advancedMounts:
          *app :
            01-agent-source:
              - path: /agent-src
            03-install-tools:
              - path: /opt/hermes
            app:
              - path: /opt/hermes
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /cache
            subPath: cache
