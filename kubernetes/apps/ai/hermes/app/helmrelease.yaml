---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data
                cp /run/config/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.19@sha256:9f367c7756ef087661a361536a89f438d57a122b958dc23d82d456b1433e6e9e
            args: ["gateway", "run"]
            env:
              API_SERVER_ENABLED: true
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_PORT: &apiPort 8642
              HERMES_HOME: /opt/data
              HOME: /opt/data
              HERMES_DASHBOARD: true
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_PORT: &dashPort 9119
              HERMES_DASHBOARD_INSECURE: true
              GATEWAY_ALLOW_ALL_USERS: true
              SEARXNG_URL: http://searxng.default.svc.cluster.local:8080
              TERM: xterm-256color
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec: &probeSpec
                  httpGet:
                    path: ${GATUS_PATH}
                    port: *dashPort
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                <<: *probes
                spec:
                  <<: *probeSpec
                  periodSeconds: 10
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 4Gi
            # The image entrypoint starts as root for s6/permission setup, then
            # drops gateway execution to the non-root hermes user.
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *dashPort
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *dashPort
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /opt/data
      config:
        type: secret
        name: "{{ .Release.Name }}-configmap-secret"
        defaultMode: 0o755
        advancedMounts:
          hermes:
            init:
              - path: /run/config/config.yaml
                subPath: config.yaml
      nfs:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/shares/hermes
        globalMounts:
          - path: /nfs-data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /cache
            subPath: cache
