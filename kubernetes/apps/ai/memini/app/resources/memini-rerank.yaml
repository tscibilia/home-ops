---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: memini-rerank
spec:
  source: https://huggingface.co/Voodisss/Qwen3-Reranker-0.6B-GGUF-llama_cpp/resolve/main/Qwen3-Reranker-0.6B-Q4_K_M.gguf
  format: gguf
  hardware:
    accelerator: vulkan
    gpu:
      count: 1
      enabled: true
      layers: 99
      # Shareable /dev/dri render node advertised by generic-device-plugin.
      resourceName: kernel.org/dri-render
      vendor: intel
  quantization: Q4_K_M
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: memini-rerank
spec:
  modelRef: memini-rerank
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b10088@sha256:7909e1cb0c4ad507bf0118344b78db7b33a3e40caf1f48d90ef08352af999e4c
  replicas: 1
  nodeSelector:
    topology.kubernetes.io/zone: m
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: extensions.talos.dev/i915
                operator: Exists
  podSecurityContext:
    # 102 = curlimages/curl curl_group GID; makes the /models emptyDir
    # writable by the model-downloader init container (we override the
    # chart's default fsGroup by supplying podSecurityContext).
    fsGroup: 102
    supplementalGroups:
      - 44
      - 992
  # per-slot ctx = contextSize/parallelSlots; 2 slots = 4096, fits memini's query+doc.
  contextSize: 8192
  parallelSlots: 2
  batchSize: 8192
  uBatchSize: 4096
  resources:
    gpu: 1
    cpu: 100m
    memory: 2Gi
  extraArgs:
    # Qwen3-Reranker needs rank pooling; --reranking + --pooling rank exposes
    # the Cohere-style /v1/rerank endpoint memini calls.
    - --reranking
    - --pooling
    - rank
    - --embedding
    - --cache-ram
    - "0"
    - --no-mmap
    - --sleep-idle-seconds
    - "300"
    - --alias
    - qwen3-reranker-0.6b
    - --metrics
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
