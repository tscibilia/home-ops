---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app memini
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    fullnameOverride: *app
    controllers:
      main:
        type: deployment
        replicas: 1
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-initdb-secret"
        containers:
          main:
            env:
              MEMINI_API_KEYS_FILE: &apiFile /etc/memini/api-keys.yaml
              MEMINI_BACKEND: postgres
              MEMINI_LOG_FORMAT: json
              MEMINI_DEFAULT_NAMESPACE: "memini"
              MEMINI_DEMOTE_AFTER: 1440h
              MEMINI_TOMBSTONE_TTL: 720h
              MEMINI_EMBED_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              MEMINI_EMBED_MODEL: memini-embed # Qwen3-Embedding-0.6B, 8k ctx
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              MEMINI_RECALL_EMBED_TIMEOUT: "10s"
              MEMINI_EMBED_MAX_CONCURRENCY: "2"
              MEMINI_WRITE_DEDUP_SCORE: "0.80"
              MEMINI_WRITE_DEDUP_ACTION: coalesce
              MEMINI_DEDUP_TIERS: episodic
              MEMINI_DEDUP_SIMILARITY: 0.80
              MEMINI_SHORT_TERM_CAP: 300
              MEMINI_RERANK: http://litellm.ai.svc.cluster.local:4000/v1
              MEMINI_RERANK_MODEL: memini-rerank # Qwen3-Reranker-0.6B, 8k ctx
              MEMINI_REEMBED_ON_MODEL_CHANGE: false # update when switching models, increase probes when true
              MEMINI_POSTGRES_DSN:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-pguser-secret"
                    key: uri
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: &secret "{{ .Release.Name }}-secret"
                    key: MEMINI_API_KEY
            envFrom:
              - secretRef:
                  name: *secret
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    route:
      ui:
        enabled: true
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        enabled: false
      api-keys:
        enabled: true
        type: secret
        name: memini-api-keys
        globalMounts:
          - path: *apiFile
            subPath: api-keys.yaml
            readOnly: true
      initdb:
        type: configMap
        name: memini-initdb
        globalMounts:
          - path: /initdb
            readOnly: true
    serviceMonitor:
      main:
        enabled: true
