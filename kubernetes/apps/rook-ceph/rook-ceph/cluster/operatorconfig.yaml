---
# yaml-language-server: $schema: https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/csi.ceph.io/operatorconfig_v1.json
# Reduce CSI controller replicas to 1 to prevent concurrent DeleteVolume
# in-flight lock storms when many VolSync PVCs are deleted simultaneously.
# With 2 replicas, it's causing persistent VolumeFailedDelete events.
apiVersion: csi.ceph.io/v1
kind: OperatorConfig
metadata:
  name: ceph-csi-operator-config
  namespace: rook-ceph
spec:
  driverSpecDefaults:
    controllerPlugin:
      replicas: 1
