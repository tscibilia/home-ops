---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name pangolin-operator-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    template:
      data:
        PANGOLIN_API_URL: "{{ .K8S_API_URL }}"
        PANGOLIN_API_KEY: "{{ .K8S_API_KEY }}"
        PANGOLIN_ENDPOINT: "{{ .K8S_HOSTNAME }}"
        PANGOLIN_ORG_ID: "homelab"
        VPS_IP: "{{ .racknerd_vps_ip }}"
  dataFrom:
    - extract:
        key: /network/pangolin-operator
  data:
    - secretKey: racknerd_vps_ip
      remoteRef:
        key: docker/vps-pangolin/racknerd-vps-ip

