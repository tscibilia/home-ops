---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pangolin-operator
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 30m
  values:
    image:
      repository: ghcr.io/home-operations/pangolin-operator
      tag: 0.1.3
    pangolin:
      existingSecret: pangolin-operator-secret
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
