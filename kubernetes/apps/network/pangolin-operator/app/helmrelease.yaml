---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pangolin-operator
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 30m
  values:
    image:
      repository: ghcr.io/home-operations/pangolin-operator
      tag: 0.1.1
    pangolin:
      existingSecret: "{{ .Release.Name }}-secret"
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
