---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pangolin-operator
spec:
  dependsOn:
    - name: secret-stores
      namespace: external-secrets
  interval: 1h
  path: ./kubernetes/apps/network/pangolin-operator/app
  postBuild:
    substitute:
      GATUS_SUBDOMAIN: tun
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pangolin-operator-config
spec:
  dependsOn:
    - name: pangolin-operator
  interval: 1h
  path: ./kubernetes/apps/network/pangolin-operator/config
  postBuild:
    substitute:
      GATUS_SUBDOMAIN: tun
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
      - kind: Secret
        name: pangolin-operator-secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: true
