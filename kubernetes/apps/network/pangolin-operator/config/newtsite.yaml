---
# yaml-language-server: $schema=https://crd.movishell.pl/pangolin.home-operations.com/newtsite_v1alpha1.json
apiVersion: pangolin.home-operations.com/v1alpha1
kind: NewtSite
metadata:
  name: &name k8s-cluster
spec:
  name: *name
  autoDiscover:
    annotationPrefix: pangolin-operator
    denyCountries: RU,CN,KP,IR,BY,IL
    gatewayName: envoy-external
    gatewayNamespace: network
    ssl: true
    enableRouteDiscovery: true
    enableServiceDiscovery: true
  newt:
    # renovate: datasource=github-releases depName=fosrl/newt
    tag: 1.13.0
    mtu: 1380
    acceptClients: true
