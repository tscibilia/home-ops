---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name ts-ai3090-node-0
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    creationPolicy: Orphan # ESO will create if it doesn't exist, but won't overwrite/delete it
    template:
      data:
        _current-profile: "{{ .TS_AI3090_CURRENT_PROFILE }}"
        _machinekey: "{{ .TS_AI3090_MACHINEKEY }}"
        _profiles: "{{ .TS_AI3090_PROFILES }}"
        profile-fc51: "{{ .TS_AI3090_PROFILE_DATA }}"
        authkey: "{{ .TS_NODE_AUTHKEY }}"
  dataFrom:
    - extract:
        key: /network/tailscale/ai3090-node
    - extract:
        key: /network/tailscale/authkey
