---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/apps/statefulset_v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: &app ts-exit-node
spec:
  serviceName: *app
  replicas: 1
  selector:
    matchLabels:
      app: *app
  template:
    metadata:
      labels:
        app: *app
    spec:
      serviceAccountName: proxies
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:v1.98.4@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
          env:
            - name: TS_KUBE_SECRET
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name # → ts-exit-node-0
            - name: TS_HOSTNAME
              value: k8s-egress
            - name: TS_ROUTES
              value: 192.168.5.0/24
            - name: TS_EXTRA_ARGS
              value: --advertise-exit-node
            - name: TS_USERSPACE
              value: "true"
            - name: TS_DEBUG_FIREWALL_MODE
              value: nftables
          securityContext:
            privileged: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/core/service_v1.json
apiVersion: v1
kind: Service
metadata:
  name: &name ts-exit-node
spec:
  clusterIP: None
  selector:
    app: *name
