---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# https://github.com/tholinka/home-ops/blob/main/kubernetes/apps/media/qbittorrent/app/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app seanime
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/ju1-js/seanime
              tag: v3.10.1-hwaccel@sha256:9c6c4ce1671dbdd8ab55886161c402e2a3c9e470b21eb5f5c1872646fcab7bb6
            command:
              - /bin/sh
              - -c
              - |
                rm -rf /home/seanime/.config/Seanime
                ln -s /seanime /home/seanime/.config/Seanime
                if [ ! -f /seanime/config.toml ]; then
                  cat > /seanime/config.toml << 'TOML'
                version = '3.9.1'

                [cache]
                dir = '/cache'
                transcodedir = '/cache/transcode'

                [database]
                name = 'seanime'

                [extensions]
                dir = '/seanime/extensions'

                [logs]
                dir = '/seanime/logs'

                [anime]
                downloaddir = '/media/anime'

                [manga]
                downloaddir = '/media/manga'
                localdir = '/seanime/manga-local'

                [offline]
                assetdir = '/seanime/offline/assets'
                dir = '/seanime/offline'

                [server]
                host = '0.0.0.0'
                offline = false
                port = 80
                usebinarypath = true
                secureMode = 'lax'
                accessAllowlist = ['https://*.${SECRET_DOMAIN}']

                [torrent]
                dir = '/media/downloads/completed/seanime'

                [web]
                assetdir = '/seanime/assets'
                TOML
                fi
                exec /app/seanime
            env:
              SEANIME_DATA_DIR: /seanime
              SEANIME_SERVER_HOST: 0.0.0.0
              SEANIME_SERVER_PORT: &port 80
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec: &probeSpec
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                <<: *probes
                spec:
                  <<: *probeSpec
                  periodSeconds: 10
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              claims:
                - name: gpu
              requests:
                cpu: "1"
                memory: 1Gi
              limits:
                cpu: "2"
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: *app
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "vpn",
            "namespace": "network",
            "ips": ["192.168.99.100/24"],
            "mac": "0e:df:3a:a8:d8:ba"
          }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: Always
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          *app :
            app:
              - path: /seanime
      media:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/media
        globalMounts:
          - path: /media
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /cache
            subPath: cache
