---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/grafana.integreatly.org/grafanaalertrulegroup_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaAlertRuleGroup
metadata:
  name: sonarr-alerts
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folderUID: Logs
  interval: 5m
  rules:
    - uid: sonarr-database-locked
      title: SonarrDatabaseIsLocked
      condition: C
      data:
        - refId: A
          queryType: range
          relativeTimeRange:
            from: 300
            to: 0
          datasourceUid: victorialogs
          model:
            expr: |
              app:~"sonarr"
              | _msg:~"(?i)database is locked"
            intervalMs: 60000
            maxDataPoints: 43200

        - refId: B
          queryType: ""
          relativeTimeRange:
            from: 300
            to: 0
          datasourceUid: __expr__
          model:
            type: reduce
            expression: A
            reducer: count

        - refId: C
          queryType: ""
          relativeTimeRange:
            from: 300
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
      annotations:
        summary: "sonarr is experiencing database issues"
      labels:
        severity: critical
        app: sonarr
      for: 5m
      noDataState: OK
      execErrState: Alerting

    - uid: sonarr-database-malformed
      title: SonarrDatabaseIsMalformed
      condition: C
      data:
        - refId: A
          queryType: range
          relativeTimeRange:
            from: 300
            to: 0
          datasourceUid: victorialogs
          model:
            expr: |
              app:~"sonarr"
              | _msg:~"(?i)database disk image is malformed"
            intervalMs: 60000
            maxDataPoints: 43200

        - refId: B
          queryType: ""
          relativeTimeRange:
            from: 300
            to: 0
          datasourceUid: __expr__
          model:
            type: reduce
            expression: A
            reducer: count

        - refId: C
          queryType: ""
          relativeTimeRange:
            from: 300
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            expression: B
            conditions:
              - evaluator:
                  params:
                    - 0
                  type: gt
                operator:
                  type: and
      annotations:
        summary: "sonarr is experiencing database issues"
      labels:
        severity: critical
        app: sonarr
      for: 5m
      noDataState: OK
      execErrState: Alerting
