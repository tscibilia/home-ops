---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
sonarr:
  series:
    base_url: http://sonarr.media.svc.cluster.local:8989
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: false
    media_management:
      propers_and_repacks: do_not_prefer
    media_naming:
      series: plex-tvdb # "{Series Title} ({Release Year}) {tmdb-{TmdbId}}"
      season: default
      episodes:
        rename: true
        standard: default # "{Series TitleYear} - S{season:00}E{episode:00} - {Episode CleanTitle:90} {[Custom Formats]}{[Quality Full]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoDynamicRangeType]}{[Mediainfo VideoCodec]}{-Release Group}"
        daily: default # "{Series TitleYear} - {Air-Date} - {Episode CleanTitle:90} {[Custom Formats]}{[Quality Full]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoDynamicRangeType]}{[Mediainfo VideoCodec]}{-Release Group}"
        anime: default # "{Series TitleYear} - S{season:00}E{episode:00} - {absolute:000} - {Episode CleanTitle:90} {[Custom Formats]}{[Quality Full]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{MediaInfo AudioLanguages}{[MediaInfo VideoDynamicRangeType]}[{Mediainfo VideoCodec }{MediaInfo VideoBitDepth}bit]{-Release Group}"
    quality_definition:
      type: series
      preferred_ratio: 0.04 # Adjust for preferred file size
    quality_profiles:
      - trash_id: 9d142234e45d6143785ac55f5a9e8dc9 # WEB-1080p
        min_upgrade_format_score: 100
        upgrade:
          allowed: false
          until_quality: WEB 720p
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f # Remux-1080p - Anime
        min_format_score: 2000
        min_upgrade_format_score: 100
        upgrade:
          allowed: false
          until_quality: WEB 720p
    custom_formats:
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
        assign_scores_to:
          - name: WEB-1080p
          - name: Remux-1080p - Anime
      - trash_ids:
          - d7c747094a7c65f4c2de083c24899e8b # Proritize Freeleech
        assign_scores_to:
          - name: WEB-1080p
          - name: Remux-1080p - Anime
            score: 250
      - trash_ids:
          - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 2000 # Require (Jap/Eng) dual audio

radarr:
  movies:
    base_url: http://radarr.media.svc.cluster.local:7878
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: false
    media_management:
      propers_and_repacks: do_not_prefer
    media_naming:
      folder: plex-tmdb # "{Movie CleanTitle} ({Release Year}) {tmdb-{TmdbId}}"
      movie:
        rename: true
        standard: plex-tmdb # "{Movie CleanTitle} {(Release Year)} {tmdb-{TmdbId}} - {edition-{Edition Tags}} {[MediaInfo 3D]}{[Custom Formats]}{[Quality Full]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoDynamicRangeType]}{[Mediainfo VideoCodec]}{-Release Group}"
    quality_definition:
      type: movie
      preferred_ratio: 0.08
    quality_profiles:
      - trash_id: 90a3370d2d30cbaf08d9c23b856a12c8 # SQP-1 WEB (1080p)
        min_upgrade_format_score: 100
      - trash_id: 64fb5f9858489bdac2af690e27c8f42f # UHD Bluray + WEB
        min_upgrade_format_score: 100
        upgrade:
          allowed: true
          until_quality: WEB 2160p
    custom_formats:
      - trash_ids:
          - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
        assign_scores_to:
          - name: SQP-1 WEB (1080p)
            score: 0
      - trash_ids:
          - 0d91270a7255a1e388fa85e959f359d8 # Proritize Freeleech
