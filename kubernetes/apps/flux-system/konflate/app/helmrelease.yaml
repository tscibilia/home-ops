---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app konflate
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    config:
      repo: "github://tscibilia/home-ops"
      statusChecks: true
      prComments: true
      publicUrl: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
      mcp: true
    secret:
      existingSecret: "{{ .Release.Name }}-webhook-token-secret"
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
