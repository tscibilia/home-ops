---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name konflate-webhook-token-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    template:
      data:
        KONFLATE_WEBHOOK_SECRET: "{{ .KONFLATE_WEBHOOK_SECRET }}"
        KONFLATE_APP_CLIENT_ID: "{{ .ACTIONS_RUNNER_APP_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .ACTIONS_RUNNER_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: /kubernetes/konflate
    - extract:
        key: /kubernetes/actions-runner
