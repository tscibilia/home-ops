---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    serviceMonitor:
      create: true
    web:
      config:
        authentication:
          type: Anonymous
          anonymous:
            username: flux
            groups: ["flux-admin"]
      httpRoute:
        enabled: true
        # TODO: had to substitute with actual hostnames on bootstrap
        hostnames: ["flux.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
      networkPolicy:
        create: false
