---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
  labels:
    app.kubernetes.io/sidecar: &sidecar code-server
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-soco-fix:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            command:
              - sh
              - -c
              - |
                mkdir -p /config/custom_components/soco_ip_fix
                cp /soco-config/manifest.json /config/custom_components/soco_ip_fix/
                cp /soco-config/__init__.py /config/custom_components/soco_ip_fix/
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.4.1@sha256:1000851ce4d5bf2f6790bfc8b9052daa2c33a84f92e0bad7d60e0a9333ff4dc2
            env:
              TZ: ${TIMEZONE}
              HASS_HTTP_TRUSTED_PROXY_1: 10.43.0.0/16
              HASS_HTTP_TRUSTED_PROXY_2: 10.42.0.0/16
              HASS_HTTP_TRUSTED_PROXY_3: 192.168.107.0/24
              HASS_HTTP_TRUSTED_PROXY_4: 192.168.5.0/24
              HASS_HTTP_TRUSTED_PROXY_5: 192.168.1.0/24
              HASS_ADVERTISED_IP: 192.168.107.50
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
        pod:
          annotations:
            external-dns.alpha.kubernetes.io/hostname: home-assistant.internal
            k8s.v1.cni.cncf.io/networks: |-
              [{
                "name": "iot",
                "namespace": "network",
                "ips": ["192.168.107.50/24"],
                "mac": "02:3a:8e:c5:d7:91"
              }]
          dnsConfig:
            options:
              - name: single-request
      *sidecar :
        annotations:
          secret.reloader.stakater.com/reload: home-assistant-deploykey
        containers:
          *sidecar :
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.114.0@sha256:14e279b1e741d58d99b8afb1b24fa6cb0a433a3edf58bf271720e4d4ace225af
            env:
              GIT_CONFIG_GLOBAL: /mnt/code-server/.gitconfig
              GIT_SSH_COMMAND: ssh -i /home/coder/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /mnt/code-server
              - --extensions-dir
              - /mnt/code-server
              - --port
              - "12321"
              - /config
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/controller: *app
                      app.kubernetes.io/name: *app
                  topologyKey: kubernetes.io/hostname
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{.Release.Name}}"
        controller: *app
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
      *sidecar :
        controller: *sidecar
        ports:
          http:
            port: 12321
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}", "${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
      *sidecar :
        hostnames: ["ha-code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: *sidecar
    # Custom component to fix Sonos SoCo library binding to pod IP instead of Multus IOT IP.
    # Sets soco.config.EVENT_LISTENER_IP so Sonos speakers can reach HA for event callbacks.
    configMaps:
      soco-config:
        data:
          manifest.json: |
            {
              "domain": "soco_ip_fix",
              "name": "Soco IP Fix",
              "version": "1.0.0",
              "codeowners": [],
              "dependencies": [],
              "requirements": []
            }
          __init__.py: |
            import soco.config
            soco.config.EVENT_LISTENER_IP = "192.168.107.50"

            async def async_setup(hass, config):
                return True
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          *app :
            copy-soco-fix:
              - path: /config
            app:
              - path: /config
          *sidecar :
            *sidecar :
              - path: /config
              - path: /mnt/code-server
                subPath: code-server
      config-cache:
        existingClaim: "{{ .Release.Name }}-cache"
        advancedMounts:
          *app :
            app:
              - path: /config/.venv
      tmp:
        type: emptyDir
        advancedMounts:
          *app :
            app:
              - path: /tmp
                subPath: home-assistant-tmp
          *sidecar :
            *sidecar :
              - path: /tmp
                subPath: code-server-tmp
              - path: /nonexistent
                subPath: nonexistent
      soco-config:
        type: configMap
        name: home-assistant
        advancedMounts:
          *app :
            copy-soco-fix:
              - path: /soco-config
      deploy-key:
        type: secret
        name: home-assistant-deploykey
        defaultMode: 256
        advancedMounts:
          *sidecar :
            *sidecar :
              - path: /home/coder/.ssh/id_ed25519
                subPath: id_ed25519
