---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
  labels:
    app.kubernetes.io/sidecar: &sidecar code-server
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.2.3@sha256:d73c9c53a8562e12211f24fd7303c422051220636972485df291dbec885d8a3d
            env:
              TZ: ${TIMEZONE}
              HASS_HTTP_TRUSTED_PROXY_1: 10.43.0.0/16
              HASS_HTTP_TRUSTED_PROXY_2: 10.42.0.0/16
              HASS_HTTP_TRUSTED_PROXY_3: 192.168.107.0/24
              HASS_HTTP_TRUSTED_PROXY_4: 192.168.5.0/24
              HASS_HTTP_TRUSTED_PROXY_5: 192.168.1.0/24
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |-
              [{
                "name": "iot",
                "namespace": "network",
                "ips": ["192.168.107.50/24"],
                "mac": "02:3a:8e:c5:d7:91"
              }]
      *sidecar :
        annotations:
          secret.reloader.stakater.com/reload: home-assistant-deploykey
        containers:
          *sidecar :
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.109.2@sha256:1b84cd817fe8eb1159323ae9d2f29b3c70c6ccd44958d651a94900cf7f0ff9c4
            env:
              GIT_CONFIG_GLOBAL: /mnt/code-server/.gitconfig
              GIT_SSH_COMMAND: ssh -i /home/coder/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /mnt/code-server
              - --extensions-dir
              - /mnt/code-server
              - --port
              - "12321"
              - /config
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/controller: *app
                      app.kubernetes.io/name: *app
                  topologyKey: kubernetes.io/hostname
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1044
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{.Release.Name}}"
        controller: *app
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
      *sidecar :
        controller: *sidecar
        ports:
          http:
            port: 12321
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}", "${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
      *sidecar :
        hostnames: ["ha-code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: *sidecar
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          *app :
            app:
              - path: /config
          *sidecar :
            *sidecar :
              - path: /config
              - path: /mnt/code-server
                subPath: code-server
      config-cache:
        existingClaim: "{{ .Release.Name }}-cache"
        advancedMounts:
          *app :
            app:
              - path: /config/.venv
      tmp:
        type: emptyDir
        advancedMounts:
          *app :
            app:
              - path: /tmp
                subPath: home-assistant-tmp
          *sidecar :
            *sidecar :
              - path: /tmp
                subPath: code-server-tmp
              - path: /nonexistent
                subPath: nonexistent
      deploy-key:
        type: secret
        name: home-assistant-deploykey
        defaultMode: 256
        advancedMounts:
          *sidecar :
            *sidecar :
              - path: /home/coder/.ssh/id_ed25519
                subPath: id_ed25519
