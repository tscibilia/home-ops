---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app esphome
  labels:
    app.kubernetes.io/sidecar: &sidecar code-server
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          secret.reloader.stakater.com/reload: &secrets esphome-secret
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/esphome
              tag: 2026.4.0@sha256:f2903ef91562cd00ff7707cfff417565879ad4a147a27343bc9f4be1bfe849cd
            env:
              TZ: ${TIMEZONE}
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 5m
                memory: 512Mi
              limits:
                memory: 2Gi
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |-
              [{
                "name": "iot",
                "namespace": "network",
                "ips": ["192.168.107.49/24"],
                "mac": "02:7f:b4:2c:e9:15"
              }]
      *sidecar :
        annotations:
          secret.reloader.stakater.com/reload: esphome-secret,esphome-deploykey
        containers:
          *sidecar :
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.115.0@sha256:cbd5e05849367e521f774b760602cb9e0a8da1f159eaf89600490eec34129fe5
            env:
              GIT_CONFIG_GLOBAL: /mnt/code-server/.gitconfig
              GIT_SSH_COMMAND: ssh -i /home/coder/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /mnt/code-server
              - --extensions-dir
              - /mnt/code-server
              - --port
              - "12321"
              - /config
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/controller: *app
                      app.kubernetes.io/name: *app
                  topologyKey: kubernetes.io/hostname
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{.Release.Name}}"
        controller: *app
        ports:
          http:
            port: 6052
      *sidecar :
        controller: *sidecar
        ports:
          http:
            port: 12321
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
      *sidecar :
        hostnames: ["esphome-code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: *sidecar
    persistence:
      config:
        existingClaim: esphome
        advancedMounts:
          *app :
            app:
              - path: /config
                subPath: config
          *sidecar :
            *sidecar :
              - path: /config
                subPath: config
              - path: /mnt/code-server
                subPath: code-server
      secrets:
        type: secret
        name: *secrets
        globalMounts:
          - path: /config/secrets.yaml
            subPath: secrets.yaml
      buildcache:
        suffix: buildcache
        size: 50Gi
        accessMode: ReadWriteOnce
        advancedMounts:
          *app :
            app:
              - path: /cache
      tmpfs:
        type: emptyDir
        advancedMounts:
          *app :
            app:
              - path: /tmp
                subPath: esphome-tmp
          *sidecar :
            *sidecar :
              - path: /tmp
                subPath: code-server-tmp
              - path: /nonexistent
                subPath: nonexistent
      deploy-key:
        type: secret
        name: esphome-deploykey
        defaultMode: 256
        advancedMounts:
          *sidecar :
            *sidecar :
              - path: /home/coder/.ssh/id_ed25519
                subPath: id_ed25519
