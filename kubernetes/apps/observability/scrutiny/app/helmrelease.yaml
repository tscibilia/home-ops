---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scrutiny
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-influxdb:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - sh
              - -c
              - until wget -qO- http://scrutiny-influxdb:8086/health; do echo "waiting for influxdb..."; sleep 2; done
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image:
              repository: ghcr.io/analogj/scrutiny
              tag: v0.9.0-web@sha256:767ec2fd4104166bf8d4c3ca07009c27200f1015c649e2204533785b1cf922f1
            env:
              TZ: ${TIMEZONE:-UTC}
              SCRUTINY_WEB_INFLUXDB_HOST: scrutiny-influxdb
              SCRUTINY_WEB_INFLUXDB_PORT: "8086"
              SCRUTINY_WEB_INFLUXDB_ORG: homelab
              SCRUTINY_WEB_INFLUXDB_BUCKET: scrutiny
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &scrutinyPort 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      *app :
        controller: *app
        ports:
          http:
            port: *scrutinyPort
        annotations:
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |
            group: "services"
      lb:
        controller: *app
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.5.233
          external-dns.alpha.kubernetes.io/hostname: scrutiny.internal
        ports:
          http:
            port: 80
            targetPort: *scrutinyPort
    route:
      app:
        hostnames: ["${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"]
        annotations:
          gatus.home-operations.com/enabled: "false"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: *app
                port: *scrutinyPort
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /opt/scrutiny/config
