---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controller:
      extraVolumes:
        - name: repo
          nfs:
            server: clonenas.internal
            path: /mnt/vault/backups/kubernetes/kopiur
      extraVolumeMounts:
        - name: repo
          mountPath: /repo
      resources:
        requests:
          cpu: 100m
        limits:
          memory: 2Gi
      streamingLists: true
    grafanaDashboard:
      enabled: true
      grafanaOperator:
        enabled: true
        matchLabels:
          grafana.internal/instance: grafana
    installScope: cluster
    metrics:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    webhook:
      serviceMonitor:
        enabled: true
