---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name cetranscript-ghcr-pull
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"{{ .GHCR_USER }}","password":"{{ .GHCR_TOKEN }}","auth":"{{ printf "%s:%s" .GHCR_USER .GHCR_TOKEN | b64enc }}"}}}'
  dataFrom:
    - extract:
        key: /kubernetes/github
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name cetranscript-api-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    template:
      data:
        DATABASE_URL: "postgresql://${APP}:{{ .cetranscript_postgres_password }}@pgsql-cluster.database.svc.cluster.local:5432/${APP}"
        VALKEY_URL: "redis://dragonfly-cluster.database.svc.cluster.local:6379/7"
        S3_ENDPOINT: "{{ .S3_ENDPOINT }}"
        S3_ACCESS_KEY_ID: "{{ .S3_ACCESS_KEY_ID }}"
        S3_SECRET_ACCESS_KEY: "{{ .S3_SECRET_ACCESS_KEY }}"
        S3_BUCKET: "{{ .S3_BUCKET }}"
        BETTER_AUTH_SECRET: "{{ .BETTER_AUTH_SECRET }}"
        INITIAL_ADMIN_EMAIL: "{{ .INITIAL_ADMIN_EMAIL }}"
        STRIPE_SECRET_KEY: "{{ .STRIPE_SECRET_KEY }}"
        STRIPE_WEBHOOK_SECRET: "{{ .STRIPE_WEBHOOK_SECRET }}"
        STRIPE_PROBO_PRICE_ID: "{{ .STRIPE_PROBO_LIMITED_PRICE_ID }}"
        STRIPE_OMNIA_PRICE_ID: "{{ .STRIPE_OMNIA_LIMITED_PRICE_ID }}"
        RESEND_API_KEY: "{{ .RESEND_API_KEY }}"
        FROM_EMAIL: "{{ .FROM_EMAIL }}"
        # FORWARD_TO_EMAIL: "{{ .FORWARD_TO_EMAIL }}"
        AIA_API_BASE_URL: https://ceproviderapi.aia.org
        NCARB_API_URL: https://www.ncarb.org/api/map/requirements
  dataFrom:
    - extract:
        key: /default/cetranscript
    - extract:
        key: /database/cnpg-users
