---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/referencegrant_v1beta1.json
# adapted from https://github.com/authelia/authelia/blob/master/docs/content/integration/proxies/envoy.md#secure-route
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: ref-authentik-svc
spec:
  from:
    - &policy
      group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: database
    - <<: *policy
      namespace: default
    - <<: *policy
      namespace: flux-system
    - <<: *policy
      namespace: media
    - <<: *policy
      namespace: network
    - <<: *policy
      namespace: observability
    - <<: *policy
      namespace: volsync-system
  to:
    - group: ''
      kind: Service
      name: ak-outpost-authentik-embedded-outpost
    - group: ''
      kind: Service
      name: authentik-outpost-internal
    - group: ''
      kind: Service
      name: authentik-outpost-external