---
name: "selfhosted"
is_done_tick_dot_com: false
is_user_creation_disabled: true
telegram:
  token: ""
pushover:
  token: ""
database:
  type: "postgres"
  migration: true
  host: "pgsql-cluster-rw.database.svc.cluster.local"
  port: 5432
  user: "${APP}"
  password: "{{ .donetick_postgres_password }}"
  name: "${APP}"
jwt:
  secret: "{{ .DONETICK_JWT_SECRET }}"
  session_time: 168h
  max_refresh: 168h
server:
  port: 2021
  read_timeout: 10s
  write_timeout: 10s
  rate_period: 60s
  rate_limit: 300
  cors_allow_origins:
    - "https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"
    - "http://localhost:5173"
    - "http://localhost:7926"
    # the below are required for the android/iOS apps to work
    - "https://localhost"
    - "http://localhost"
    - "capacitor://localhost"
    - "donetick://localhost"
  serve_frontend: true
logging:
  level: "debug"
  encoding: "json"
  development: false
scheduler_jobs:
  due_job: 30m
  overdue_job: 3h
  pre_due_job: 3h
email:
  # SMTP / Amazon SES — verify exact env var names in donetick docs
  host: # "{{ .SMTP_HOST }}"
  port: # {{ .SMTP_PORT | atoi }}
  key:
  email: # Donetick <"{{ .SMTP_FROM }}">
  appHost:
oauth2:
  client_id: "{{ .DONETICK_OAUTH2_CLIENT_ID }}"
  client_secret: "{{ .DONETICK_OAUTH2_CLIENT_SECRET }}"
  auth_url: "https://{{ .AUTHENTIK_SSO_SUBDOMAIN }}.${SECRET_DOMAIN}/application/o/authorize/"
  scopes:
   - "openid"
   - "profile"
   - "email"
  token_url: "https://{{ .AUTHENTIK_SSO_SUBDOMAIN }}.${SECRET_DOMAIN}/application/o/token/"
  user_info_url: "https://{{ .AUTHENTIK_SSO_SUBDOMAIN }}.${SECRET_DOMAIN}/application/o/userinfo/"
  redirect_url: "https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}/auth/oauth2"
  name: "Authentik SSO"
storage:
  storage_type: "remote"
  bucket_name: "t0m-donetick"
  region: "us-east-1"
  base_path: "assets"
  access_key: "{{ .DONETICK_ACCESS_KEY }}"
  secret_key: "{{ .DONETICK_SECRET_KEY }}"
  endpoint: "https://s3.${SECRET_DOMAIN}"
  public_host: ""
  max_user_storage: 104857600  # 100MB
  max_file_size: 2097152       # 2MB
# Real-time configuration
realtime:
  enabled: true
  websocket_enabled: true
  sse_enabled: true
  heartbeat_interval: 60s
  connection_timeout: 120s
  max_connections: 1000
  max_connections_per_user: 5
  event_queue_size: 2048
  cleanup_interval: 2m
  stale_threshold: 5m
  enable_compression: true
  enable_stats: true
  allowed_origins:
    - "*"
