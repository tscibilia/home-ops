---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rahoot
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ralex91/rahoot
              tag: 1.2@sha256:5d18bbceadafea1fec71b19a1cc803cadb4a6daa9790f419c9779ef4c5ab0218
            env:
              TZ: ${TIMEZONE:-UTC}
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 3000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                memory: 256Mi
                cpu: 50m
              limits:
                memory: 1Gi
    # Can't set UID/GID because container designed for root
    defaultPodOptions:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    configMaps:
      config:
        data:
          game.json: |
            {
              "managerPassword": "${MANAGER_PASSWORD}"
            }
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/config
      config-files:
        type: configMap
        identifier: config
        globalMounts:
          - path: /app/config/game.json
            subPath: game.json
      data:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/shares/rahoot
        globalMounts:
          - path: /app/config/quizz
