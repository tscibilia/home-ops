---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app boxbox
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jr4dh3y/boxbox
              tag: 0.2.1@sha256:cdcb9a61919cf64ca17812e16d792bf413657c71baa497e5fd2e9db93f22e7d5
            env:
              BOXBOX_ALLOWED_ORIGINS: "https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"
            envFrom:
              - secretRef:
                  name: boxbox-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
                add: ["DAC_READ_SEARCH", "CHOWN", "FOWNER"]
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
        supplementalGroups: [3000, 4002, 4005, 4006]
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    configMaps:
      config:
        data:
          config.yaml: |
            port: 80
            host: "0.0.0.0"
            rate_limit_rps: 10
            max_upload_mb: 10240
            chunk_size_mb: 5
            mount_points:
              - name: "Users"
                path: "/mnt/tscibilia"
                read_only: false
              - name: "System"
                path: "/mnt/system"
                read_only: false
              - name: "Docs"
                path: "/mnt/docs"
                read_only: false
              - name: "Lightroom"
                path: "/mnt/lightroom"
                read_only: false
              - name: "Strata"
                path: "/mnt/strata"
                read_only: false
              - name: "Grey"
                path: "/mnt/grey"
                read_only: false
    persistence:
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      users:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/users/tscibilia
        globalMounts:
          - path: /mnt/tscibilia
      system:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/system
        globalMounts:
          - path: /mnt/system
      docs:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/docs
        globalMounts:
          - path: /mnt/docs
      lightroom:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/shares/lightroom
        globalMounts:
          - path: /mnt/lightroom
      strata:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/work/strata
        globalMounts:
          - path: /mnt/strata
      grey:
        type: nfs
        server: truenas.internal
        path: /mnt/nas/data/work/grey
        globalMounts:
          - path: /mnt/grey
