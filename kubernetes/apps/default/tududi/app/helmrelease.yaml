---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tududi
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      *app :
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        # TODO: open issue with upstream dev to support non-root users and readOnlyRootFilesystem
        containers:
          app:
            image:
              repository: ghcr.io/tscibilia/tududi
              tag: v1.1.0-dev.14@sha256:703a929556a87774d1cc5f9460c54800bb3cfc453577ff0d15d138ee1d7d4482
            env:
              TZ: "${TIMEZONE:-UTC}"
              PUID: &UID 1000
              PGID: *UID
              DB_FILE: /config/tududi.sqlite3
              TUDUDI_UPLOAD_PATH: /config/uploads
              TUDUDI_TRUST_PROXY: "true"
              TUDUDI_ALLOWED_ORIGINS: "https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN},http://localhost:3002,http://localhost:8080"
              BASE_URL: "https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}" # TODO: misdocumented upstream
              OIDC_ENABLED: true
              OIDC_PROVIDER_NAME: Authentik
              OIDC_PROVIDER_SLUG: authentik
              OIDC_SCOPE: "openid profile email"
              OIDC_AUTO_PROVISION: true
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec: &probeSpec
                  httpGet:
                    path: ${GATUS_PATH}
                    port: &port 3002
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                <<: *probes
                spec:
                  <<: *probeSpec
                  periodSeconds: 10
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: *UID
        runAsGroup: *UID
        fsGroup: *UID
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
