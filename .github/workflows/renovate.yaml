---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate

on:
  push:
    branches: ["main"]
    paths:
      - .renovaterc.json5
      - .renovate/**.json5
  schedule:
    - cron: 20 * * * *
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        type: boolean
        default: false
        required: true
      logLevel:
        description: Log Level
        type: choice
        default: debug
        options:
          - debug
          - info
        required: true
      version:
        description: Renovate Version
        default: latest
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  main:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      # Reovate rejects the digest update branch, throwing `state: "yellow" ... 422 → abort` and not completing the run.
      # - name: Load Secrets
      #   id: load-secrets
      #   uses: akeyless-community/akeyless-github-action@7cb3f935c655c794feb9d0488f05acdca85d68e2 # v1.1.6
      #   with:
      #     access-id: ${{ secrets.AKEYLESS_ACCESS_ID }}
      #     access-key: ${{ secrets.AKEYLESS_ACCESS_KEY }}
      #     access-type: access_key
      #     static-secrets: |
      #       - name: "/kubernetes/actions-runner"
      #         output-name: "runner-app-id"
      #         key: "ACTIONS_RUNNER_APP_ID"
      #       - name: "/kubernetes/actions-runner"
      #         output-name: "runner-private-key"
      #         key: "ACTIONS_RUNNER_PRIVATE_KEY"

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          # Settings for aKeyless - Load Secrets step
          # client-id: ${{ steps.load-secrets.outputs.runner-app-id }}
          # private-key: ${{ steps.load-secrets.outputs.runner-private-key }}
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-checks: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-workflows: write

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'debug' }}
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: ${{ github.repository }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun }}
          RENOVATE_INTERNAL_CHECKS_FILTER: strict
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: true
          RENOVATE_HOST_RULES: |
            [{"hostType": "docker", "matchHost": "ghcr.io", "username": "${{ github.actor }}", "password": "${{ secrets.GHCR_PAT }}"}]
        with:
          token: ${{ steps.app-token.outputs.token }}
          renovate-version: ${{ inputs.version || 'latest' }}
