---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: AI PR Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}${{ github.event.action == 'labeled' && format('-label-{0}', github.run_id) || '' }}
  cancel-in-progress: true

jobs:
  review:
    name: AI PR Review
    if: ${{ github.event.pull_request.user.login == 'kube-skywalker[bot]' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: AI PR Review
        uses: misospace/pr-reviewer-action@6ccb1823b99a0da09e9946dccd7437648d7771e1 # v2.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allow_approve: "true"
          allowed_source_hosts: github.com,api.github.com,gitlab.com,registry.terraform.io,artifacthub.io,codeberg.org,actualbudget.org
          ai_base_url: http://litellm.ai.svc.cluster.local:4000/v1
          ai_api_format: openai
          ai_model: deepseek-v4-flash-free
          ai_api_key: ${{ secrets.LITELLM_API_KEY }}
          ai_max_tokens: "1048576"
          ai_temperature: "0.1"
          ai_primary_retries: "3"
          ai_primary_retry_delay_sec: "5"
          ai_connect_timeout_sec: "15"
          ai_request_timeout_sec: "600"
          ai_stream: "true"
          ai_fallback_base_url: http://litellm.ai.svc.cluster.local:4000/v1
          ai_fallback_api_format: openai
          ai_fallback_model: qwen-local
          ai_fallback_api_key: ${{ secrets.LITELLM_API_KEY }}
          evidence_providers_file: .github/konflate-evidence.json
          inline_findings: "true"
          on_model_failure: notice
          required_check_validation_mode: warn
          review_scope: auto
          rereview_label: ai-review
          skip_if_diff_unchanged: "true"
          system_prompt_file: .agents/pr-review-instructions.md
          system_prompt_mode: append
          tool_mode: native_loop
          tool_max_requests: "10"
          tool_max_rounds: "5"
          tool_loop_wall_clock_sec: "600"
          tool_request_timeout_sec: "60"
          tool_max_response_bytes: "32000"
          tool_planning_timeout_sec: "120"
          tool_planning_max_context_bytes: "100000"
          tool_planning_max_tokens: "32000"
          tool_allowed_gh_api_repos: "tscibilia/home-ops"
          tool_enable_for_forks: "false"
          tool_mcp_servers: "tools=http://litellm.ai.svc.cluster.local:4000/mcp/,konflate=http://konflate.flux-system.svc.cluster.local:8080/mcp"
          tool_mcp_token: ${{ secrets.LITELLM_API_KEY }}
          tool_mcp_name_prefixes: "searxng_mcp,victoria_logs_mcp,sidero_mcp,context7_mcp,talos_mcp"
          publish_review_comment: "true"
          publish_mode: review_verdict
          validate_required_checks: "auto"
