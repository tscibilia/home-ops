---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: AI PR Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}${{ github.event.action == 'labeled' && format('-label-{0}', github.run_id) || '' }}
  cancel-in-progress: true

jobs:
  review:
    name: AI PR Review
    if: ${{ github.event.pull_request.user.login == 'kube-skywalker[bot]' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: AI PR Review
        uses: misospace/pr-reviewer-action@b36ea146c6563a3f49a5b9a232d411f6cf970474 # v2.0.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allow_approve: "true"
          allowed_source_hosts: github.com,api.github.com,gitlab.com,registry.terraform.io,artifacthub.io
          ai_base_url: ${{ secrets.LITELLM_BASE_URL }}
          ai_api_format: openai
          ai_model: big-pickle-free
          ai_api_key: ${{ secrets.LITELLM_API_KEY }}
          ai_max_tokens: "16000"
          ai_temperature: "0.1"
          ai_primary_retries: "2"
          ai_primary_retry_delay_sec: "5"
          ai_connect_timeout_sec: "10"
          ai_request_timeout_sec: "300"
          ai_stream: "true"
          ai_fallback_base_url: ${{ secrets.LITELLM_BASE_URL }}
          ai_fallback_api_format: openai
          ai_fallback_model: qwen-local
          ai_fallback_api_key: ${{ secrets.LITELLM_API_KEY }}
          on_model_failure: notice
          required_check_validation_mode: warn
          review_scope: auto
          rereview_label: ai-review
          skip_if_diff_unchanged: "true"
          standards_file: .agents/AGENTS.md
          system_prompt_file: .github/pr-review-system-prompt.md
          system_prompt_mode: append
          tool_mode: native_loop
          tool_max_requests: "4"
          tool_max_rounds: "2"
          tool_loop_wall_clock_sec: "180"
          tool_request_timeout_sec: "15"
          tool_max_response_bytes: "12000"
          tool_planning_timeout_sec: "60"
          tool_planning_max_context_bytes: "30000"
          tool_planning_max_tokens: "8000"
          tool_allowed_gh_api_repos: "tscibilia/home-ops"
          tool_enable_for_forks: "false"
          tool_mcp_servers: "tools=${{ secrets.LITELLM_MCP_URL }},konflate=${{ secrets.KONFLATE_MCP_URL }}"
          tool_mcp_token: ${{ secrets.LITELLM_API_KEY }}
          tool_mcp_name_prefixes: "searxng_mcp,victoria_logs_mcp,sidero_mcp,context7_mcp,talos_mcp"
          publish_review_comment: "true"
          publish_mode: review_verdict
          validate_required_checks: "auto"
