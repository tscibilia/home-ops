---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Release"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month at midnight

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate Release Notes
        id: release-notes
        uses: mirceanton/action-semver-release@fea37a9e8b01bdcba71c60327a8b02c6a0e844a5 # v3.0.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: true

      - name: Determine CalVer Tag
        id: calver
        uses: mirceanton/action-calver-release@e34e40c96ed4998c9a0adb0c8d3d821b49d789a3 # 2025.11.4
        with:
          github-token: ${{ secrets.PAT_WORKFLOW }}
          dry-run: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOW }}
          RELEASE_TAG: ${{ steps.calver.outputs.release-tag }}
          RELEASE_NOTES: ${{ steps.release-notes.outputs.release-notes }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes "$RELEASE_NOTES" \
            --latest
