[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = "{{config_root}}/talosconfig"
BOOTSTRAP_DIR = "{{config_root}}/kubernetes/bootstrap"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
SCRIPTS_DIR = "{{config_root}}/kubernetes/bootstrap/scripts"
TALOS_DIR = "{{config_root}}/kubernetes/talos"

_.file = [
  "{{config_root}}/.secrets.env",
]

[tools]
"python" = "3.14.4"
"uv" = "0.11.8"
"just" = "1.50.0"
"gum" = "0.17.0"
"pipx:flux-local" = "8.2.0"
"aqua:mitsuhiko/minijinja" = "2.19.0"
"aqua:cilium/cilium-cli" = "0.19.2"
"aqua:cli/cli" = "2.91.0" # GitHub CLI
"aqua:cloudflare/cloudflared" = "2026.3.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.6"
"aqua:helm/helm" = "4.1.4"
"aqua:helmfile/helmfile" = "1.4.4"
"aqua:jqlang/jq" = "1.7.1"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.0"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.12.6"
"aqua:yannh/kubeconform" = "0.7.0" # Kubernetes manifest validation
