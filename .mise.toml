[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }

_.file = ["{{config_root}}/.secrets.env"]
FLATE_PATH = "{{config_root}}/kubernetes/flux/cluster"
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = "{{config_root}}/talosconfig"
BOOTSTRAP_DIR = "{{config_root}}/kubernetes/bootstrap"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
SCRIPTS_DIR = "{{config_root}}/kubernetes/bootstrap/scripts"
TALOS_DIR = "{{config_root}}/kubernetes/talos"

[tools]
"gum" = "0.17.0"
"just" = "1.57.0"
"lefthook" = "2.1.10"
"oxfmt" = "0.59.0"
"python" = "3.14.6"
"uv" = "0.11.30"
"zizmor" = "1.28.0"
"pipx:ansible-core" = "latest"
"github:home-operations/flate" = "v0.4.12"
"github:home-operations/yamlls" = "0.1.14"
"aqua:mitsuhiko/minijinja" = "2.21.0"
"aqua:cilium/cilium-cli" = "0.19.6"
"aqua:cli/cli" = "2.96.0"                       # GitHub CLI
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.9.2"
"aqua:helm/helm" = "4.2.3"
"aqua:helmfile/helmfile" = "1.7.1"
"aqua:jqlang/jq" = "1.7.1"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.2"
"aqua:mikefarah/yq" = "4.53.3"
"github:home-operations/kopiur" = "0.7.5"
"aqua:siderolabs/talos" = "1.13.6"
"aqua:yannh/kubeconform" = "0.8.0"              # Kubernetes manifest validation

[hooks]
postinstall = "lefthook install"
